<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoopTrack · Lienzo New</title>
    <link rel="icon" type="image/png" href="/assets/icons/bigote.png" />

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/topbar.css" />
    <link rel="stylesheet" href="/css/lienzo.css" />
    <link rel="stylesheet" href="/css/users.css" />
  </head>

  <body>
    <div id="topbar-container"></div>

    <main class="lienzo-page">
      <div class="page-container">
        <section class="lienzo-page__body">
          <div id="lienzo-container"></div>
        </section>
      </div>
    </main>

    <script src="/js/icons.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/users.js"></script>
    <script src="/js/lienzo-new.js"></script>

    <script>
  (function () {
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    async function fetchDeckState(deckId) {
      const token = getToken();

      if (!token) {
        throw new Error("Token no encontrado");
      }

      const response = await fetch(`/mazo/${deckId}/state`, {
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (!response.ok) {
        throw new Error("No se pudo cargar el estado del mazo");
      }

      return response.json();
    }

    async function initTopbar() {
      if (typeof window.renderTopbar !== "function") return;
      await window.renderTopbar();
    }

    async function bootstrapLienzoNewPage() {
      try {
        await initTopbar();

        const deckId = Number(
          getQueryParam("deckId") || getQueryParam("id") || 0
        );

        if (!deckId) {
          console.warn("Falta deckId en la URL");
          return;
        }

        const stateResponse = await fetchDeckState(deckId);
        const state = stateResponse?.state || stateResponse || {};

        console.log("stateResponse =", stateResponse);
        console.log("state =", state);
        console.log("state.deck =", state?.deck);
        console.log("state.mazo =", state?.mazo);

        window.__currentState = state;
        window.__currentDeck = state?.deck || state?.mazo || state || {};

        console.log("window.__currentDeck =", window.__currentDeck);

        if (typeof window.openNewLienzo === "function") {
          window.openNewLienzo();
        } else {
          console.warn("openNewLienzo no está disponible");
        }
      } catch (error) {
        console.error("Error iniciando lienzo-new.html", error);

        const container = document.getElementById("lienzo-container");
        if (container) {
          container.innerHTML = `
            <div class="lienzo-page__error">
              No se pudo cargar el lienzo nuevo.
            </div>
          `;
        }
      }
    }

    document.addEventListener("DOMContentLoaded", bootstrapLienzoNewPage);
  })();
</script>
  </body>
</html>
