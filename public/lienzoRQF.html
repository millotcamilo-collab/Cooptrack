<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoopTrack · Notificación</title>
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png" />

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
  <link rel="stylesheet" href="/css/placard.css" />
</head>

<body>
  <div id="topbar-container"></div>

  <main class="lienzo-page">
    <div class="page-container">
      <section class="lienzo-page__body">
        <div id="lienzo-container"></div>
      </section>
    </div>
  </main>

  <script src="/js/icons.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/js/placard.js"></script>
  <script src="/js/lienzoRQF.js"></script>

  <script>
    (function () {
      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function getToken() {
        return localStorage.getItem("cooptrackToken");
      }

      async function fetchPlay(playId) {
        const token = getToken();

        if (!token) {
          throw new Error("Token no encontrado");
        }

        const response = await fetch(`/plays/${playId}`, {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error("No se pudo cargar la jugada");
        }

        return response.json();
      }

      async function fetchMe() {
        const token = getToken();

        if (!token) {
          throw new Error("Token no encontrado");
        }

        const response = await fetch("/me", {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error("No se pudo cargar el usuario actual");
        }

        return response.json();
      }

      async function initTopbar() {
        if (typeof window.renderTopbar !== "function") return;
        await window.renderTopbar();
      }

function renderRQFSourcePanel(play) {
  const sourceUser = resolveSourceUser(play);

  return `
    <section class="lienzo-panel lienzo-panel--source panel--split-top">
      <div class="panel-topbar">
        <div class="panel-topbar__col panel-topbar__col--identity">
          <div class="lienzo-target-header lienzo-target-header--top">
            <div class="lienzo-target-header__name">${escapeHtml(sourceUser.nickname)}</div>
            <img
              class="lienzo-target-header__photo"
              src="${escapeHtml(sourceUser.profile_photo_url)}"
              alt="${escapeHtml(sourceUser.nickname)}"
            />
          </div>
        </div>
        <div class="panel-topbar__col panel-topbar__col--actions"></div>
      </div>

      <div class="lienzo-source-cards">
        <div class="lienzo-source-stack"></div>
      </div>
    </section>
  `;
}

function renderRQFTargetPanel(play) {
  const targetUser = resolveTargetUser(play);

  return `
    <section class="lienzo-panel lienzo-panel--target panel--split-top">
      <div class="panel-topbar">
        <div class="panel-topbar__col panel-topbar__col--identity">
          <div class="lienzo-target-header lienzo-target-header--top">
            <div class="lienzo-target-header__name">${escapeHtml(targetUser.nickname)}</div>
            <img
              class="lienzo-target-header__photo"
              src="${escapeHtml(targetUser.profile_photo_url)}"
              alt="${escapeHtml(targetUser.nickname)}"
            />
          </div>
        </div>
        <div class="panel-topbar__col panel-topbar__col--actions"></div>
      </div>

      <div id="lienzo-target-dropzone" class="lienzo-target-dropzone">
        <img
          class="lienzo-card-image"
          src="${escapeHtml(getCardImageSrc(play?.card_rank, play?.card_suit))}"
          alt="${escapeHtml(`K${getSuitSymbol(play?.card_suit)}`)}"
        />
      </div>
    </section>
  `;
}

function renderRQFBanner(play) {
  const message = getRQFMessage(play);

  return `
    <section class="lienzo-panel panel--split-top">
      <div class="panel-topbar">
        <div class="panel-topbar__col panel-topbar__col--identity">
          <div class="lienzo-target-header__name">
            ${escapeHtml(message.title)}
          </div>
        </div>

        <div class="panel-topbar__col panel-topbar__col--actions">
          <button
            id="lienzo-rqf-exit-btn"
            class="icon-btn"
            type="button"
            title="Salir"
            aria-label="Salir"
          >
            <img src="/assets/icons/exit80.gif" alt="Salir" />
          </button>
        </div>
      </div>

      <div style="padding: 14px 20px; text-align: center; font-size: 18px; line-height: 1.5;">
        ${escapeHtml(message.body)}
      </div>
    </section>
  `;
}

      async function bootstrapLienzoRQFPage() {
        try {
          await initTopbar();

          const playId = Number(getQueryParam("playId") || 0);

          if (!playId) {
            console.warn("Falta playId en la URL");
            return;
          }

          const playResponse = await fetchPlay(playId);
          const meResponse = await fetchMe();

          const play = playResponse?.play || null;
          const currentUser = meResponse?.user || null;

          window.__currentPlay = play;
          window.__currentUser = currentUser;

          if (typeof window.renderLienzoRQF === "function") {
            window.renderLienzoRQF(play, currentUser);
          } else {
            console.warn("renderLienzoRQF no está disponible");
          }
        } catch (error) {
          console.error("Error iniciando lienzoRQF.html", error);

          const container = document.getElementById("lienzo-container");
          if (container) {
            container.innerHTML = `
              <div class="lienzo-error">
                No se pudo cargar la notificación.
              </div>
            `;
          }
        }
      }

      document.addEventListener("DOMContentLoaded", bootstrapLienzoRQFPage);
    })();
  </script>
</body>

</html>
