<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazos | CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/mazobar.css" />
  <link rel="stylesheet" href="/css/deck-row.css" />
</head>
<body>
  <div id="topbar-container"></div>
  <div id="create-deck-container"></div>
  <div id="decks-view-container"></div>

  <script src="/js/create-deck.js"></script>
  <script src="/js/deck-row.js"></script>
  <script src="/js/deck-view.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const view = params.get("view");

    if (typeof renderDecksView === "function") {
      renderDecksView();
    }

    if (view === "create" && typeof renderCreateDeckForm === "function") {
      renderCreateDeckForm();
    }
  </script>
</body>
</html>
