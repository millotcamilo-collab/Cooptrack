<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help · CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />

  <style>
    body {
      margin: 0;
      background: #f6f3ea;
      color: #1a1a1a;
      font-family: Arial, Helvetica, sans-serif;
    }

    .help-page {
      width: 100%;
      padding: 32px 0 48px;
      box-sizing: border-box;
    }

    .help-page__header {
      margin-bottom: 28px;
    }

    .help-page__title {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
    }

    .help-page__intro {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 820px;
    }

    .help-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 18px;
    }

    .help-card {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      border: 1px solid #d7d0c2;
      border-radius: 14px;
      background: #fffdf8;
      padding: 18px 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-sizing: border-box;
    }

    .help-card:hover,
    .help-card:focus-visible {
      transform: translateY(-2px);
      border-color: #b9ac91;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .help-card__image {
      width: 82px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .help-card__label {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: #1f1f1f;
    }

    .help-card__subtext {
      font-size: 0.92rem;
      line-height: 1.45;
      color: #5a5a5a;
    }

    .play-help-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
    }

    .play-help-modal.is-hidden {
      display: none;
    }

    .play-help-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .play-help-modal__dialog {
      position: relative;
      z-index: 2;
      width: min(680px, calc(100% - 32px));
      margin: 8vh auto 0;
      background: #fffdf8;
      border-radius: 16px;
      padding: 24px 22px 20px;
      box-sizing: border-box;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .play-help-modal__close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      border-radius: 8px;
    }

    .play-help-modal__close:hover,
    .play-help-modal__close:focus-visible {
      background: rgba(0, 0, 0, 0.06);
      outline: none;
    }

    .play-help-modal__title {
      margin: 0 0 16px;
      padding-right: 36px;
      font-size: 1.4rem;
      line-height: 1.3;
    }

    .play-help-modal__body p {
      margin: 0 0 12px;
      line-height: 1.6;
      white-space: normal;
    }

    @media (max-width: 640px) {
      .help-page {
        padding-top: 24px;
      }

      .help-page__title {
        font-size: 1.6rem;
      }

      .help-card__image {
        width: 72px;
      }
    }
  </style>
</head>
<body>
  <div id="topbar-container"></div>

  <main class="help-page">
    <div class="page-container">
      <header class="help-page__header">
        <h1 class="help-page__title">Help de jugadas</h1>
        <p class="help-page__intro">
          Aquí aparecen las jugadas que hoy tienen ayuda escrita en <strong>help.js</strong>.
          Hacé clic en una carta para ver su explicación.
        </p>
      </header>

      <section class="help-grid">
        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('A_HEART')"
          title="Ver ayuda de A corazón"
        >
          <img src="/assets/icons/Acorazon.gif" alt="A corazón" class="help-card__image" />
          <div class="help-card__label">A♥ · Fundación del mazo</div>
          <div class="help-card__subtext">Nombre, imagen y referencia principal del mazo.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('A_SPADE')"
          title="Ver ayuda de A picas"
        >
          <img src="/assets/icons/Apike.gif" alt="A picas" class="help-card__image" />
          <div class="help-card__label">A♠ · Autoridad de picas</div>
          <div class="help-card__subtext">Autoridad sobre actividades y participaciones.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('A_DIAMOND')"
          title="Ver ayuda de A diamante"
        >
          <img src="/assets/icons/Adiamante.gif" alt="A diamante" class="help-card__image" />
          <div class="help-card__label">A♦ · Autoridad económica</div>
          <div class="help-card__subtext">Control y aprobación del flujo económico.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('A_CLUB')"
          title="Ver ayuda de A trébol"
        >
          <img src="/assets/icons/Atrebol.gif" alt="A trébol" class="help-card__image" />
          <div class="help-card__label">A♣ · Autoridad de trébol</div>
          <div class="help-card__subtext">Registro o contribución comunitaria del mazo.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('J_HEART')"
          title="Ver ayuda de J corazón"
        >
          <img src="/assets/icons/Jcorazon.gif" alt="J corazón" class="help-card__image" />
          <div class="help-card__label">J♥ · Anotación</div>
          <div class="help-card__subtext">Comentario o anotación escrita dentro del mazo.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('J_SPADE')"
          title="Ver ayuda de J picas"
        >
          <img src="/assets/icons/Jpike.gif" alt="J picas" class="help-card__image" />
          <div class="help-card__label">J♠ · Actividad</div>
          <div class="help-card__subtext">Cita o deadline según el tipo elegido.</div>
        </button>

        <button
          type="button"
          class="help-card"
          onclick="openPlayHelp('J_CLUB')"
          title="Ver ayuda de J trébol"
        >
          <img src="/assets/icons/Jtrebol.gif" alt="J trébol" class="help-card__image" />
          <div class="help-card__label">J♣ · Contribución / factura</div>
          <div class="help-card__subtext">Registro económico suelto o asociado a actividad.</div>
        </button>
      </section>
    </div>
  </main>

  <script src="/js/topbar.js"></script>
  <script src="/js/help.js"></script>
</body>
</html>
