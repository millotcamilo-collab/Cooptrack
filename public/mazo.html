<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/mazobar.css" />
  <link rel="stylesheet" href="/css/playform.css" />
  <link rel="stylesheet" href="/css/plays-view.css" />
</head>
<body>
  <div id="topbar-container"></div>
  <div id="mazobar-container"></div>
  <div id="playform-container"></div>
  <div id="mazo-records-container"></div>

  <script src="/js/mazobar.js"></script>
  <script src="/js/playform.js"></script>
  <script src="/js/plays-view.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    function getStoredDeckById(deckId) {
      try {
        const raw = localStorage.getItem("cooptrackDecks");
        if (!raw) return null;

        const decks = JSON.parse(raw);
        if (!Array.isArray(decks)) return null;

        return decks.find((deck) => String(deck.id) === String(deckId)) || null;
      } catch (error) {
        console.error("Error leyendo decks:", error);
        return null;
      }
    }

    function initMazoPage() {
      const activeDeckId = sessionStorage.getItem("activeDeckId");

      if (!activeDeckId) {
        console.warn("No hay activeDeckId en sessionStorage");
        return;
      }

      const deck = getStoredDeckById(activeDeckId);

      if (!deck) {
        console.warn("No se encontró el deck activo");
        return;
      }

      if (typeof renderMazobar === "function") {
        renderMazobar("deck", deck);
      }

      if (typeof renderPlayform === "function") {
        renderPlayform(deck);
      }

      if (typeof renderPlaysView === "function") {
        renderPlaysView(deck);
      }
    }

    initMazoPage();
  </script>
</body>
</html>
