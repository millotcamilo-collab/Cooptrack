<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/mazobar.css" />
  <link rel="stylesheet" href="/css/playform.css" />
  <link rel="stylesheet" href="/css/help.css" />
  <link rel="stylesheet" href="/css/tablero.css" />
  <link rel="stylesheet" href="/css/Jcorazon.css" />
  <link rel="stylesheet" href="/css/Jtrebol.css" />
  <link rel="stylesheet" href="/css/Jpica.css" />
  <link rel="stylesheet" href="/css/Qpica.css" />
  <link rel="stylesheet" href="/css/jokerazul.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png">
</head>

<body>
  <div id="topbar-container"></div>
  <div id="mazobar-container"></div>
  <div id="playform-container"></div>
  <div id="administradores-container"></div>
  <div id="tablero-container"></div>

  <!-- UTILIDADES -->
  <script src="/js/icons.js"></script>
  <script src="/js/help.js"></script>

  <!-- COMPONENTES DE FILAS -->
  <script src="/js/Arow.js"></script>
  <script src="/js/Jcorazon.js"></script>
  <script src="/js/Jtrebol.js"></script>
  <script src="/js/Jpica.js"></script>
  <script src="/js/JpicaBomba.js"></script>
  <script src="/js/Qpica.js"></script>
  <script src="/js/jokerazulRow.js"></script>

  <!-- MÓDULOS PRINCIPALES -->
  <script src="/js/topbar.js"></script>
  <script src="/js/mazobar.js"></script>
  <script src="/js/playform.js"></script>
  <script src="/js/tablero.js"></script>
  <script src="/js/administradores.js"></script>

  <script>
    window.API_BASE_URL = window.API_BASE_URL || "https://cooptrack-backend.onrender.com";

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    function getAuthHeaders(includeJson = false) {
      const token = getToken();
      const headers = {};

      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }

      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

    async function fetchDeckById(deckId) {
      try {
        const token = getToken();

        if (!token) {
          throw new Error("Token no encontrado");
        }

        const response = await fetch(`${API_BASE_URL}/decks/${deckId}`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Error cargando mazo");
        }

        return data.mazo || data.deck;
      } catch (error) {
        console.error("Error trayendo deck:", error);
        return null;
      }
    }

    async function fetchDeckState(deckId) {
      try {
        const token = getToken();

        if (!token) {
          throw new Error("Token no encontrado");
        }

        const response = await fetch(`${API_BASE_URL}/mazo/${deckId}/state`, {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        const rawText = await response.text();
        console.log("STATE RAW RESPONSE:", rawText);

        let data;
        try {
          data = JSON.parse(rawText);
        } catch (error) {
          console.error("No es JSON válido:", rawText);
          throw new Error("El backend devolvió HTML o error");
        }

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error cargando estado del mazo");
        }

        return data;
      } catch (error) {
        console.error("Error trayendo estado del mazo:", error);
        return {
          plays: [],
          userId: null
        };
      }
    }

    function clearDeckView() {
      const ids = [
        "mazobar-container",
        "playform-container",
        "administradores-container",
        "tablero-container"
      ];

      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = "";
      });
    }

    async function loadMazoPage(deckId) {
      if (!deckId) {
        console.warn("Mazo sin id");
        return;
      }

      const [deck, state] = await Promise.all([
        fetchDeckById(deckId),
        fetchDeckState(deckId)
      ]);

      console.log("deck:", deck);
      console.log("state:", state);

      if (!deck) {
        console.warn("No se pudo cargar el mazo");
        return;
      }

      if (!state) {
        console.warn("No se pudo cargar el estado del mazo");
        return;
      }

      if (typeof renderMazobar === "function") {
        renderMazobar(deck, state.plays || [], state.userId);
      }

      if (typeof renderPlayform === "function") {
        renderPlayform(deck, state);
      }

      if (typeof renderAutoridades === "function") {
        renderAutoridades(deck, state.plays || [], state);
      }

      if (typeof renderTablero === "function") {
        renderTablero(deck, state.plays || [], state);
      }

      const tableroEl = document.getElementById("tablero-container");
      const playformEl = document.getElementById("playform-container");
      const administradoresEl = document.getElementById("administradores-container");

      if (tableroEl) tableroEl.style.display = "";
      if (playformEl) playformEl.style.display = "";
      if (administradoresEl) administradoresEl.style.display = "none";

      const plays = Array.isArray(state?.plays) ? state.plays : [];
      const currentUserId = Number(state?.userId || 0);

      const hasCorporateAccess = plays.some((play) => {
        const playCode = String(play?.play_code || "");
        const parts = playCode.split("§");

        const rank = String(play?.card_rank || parts[3] || "").toUpperCase();
        const status = String(play?.play_status || "").toUpperCase();
        const ownerUserId = Number(parts[1] || 0);

        if (status !== "ACTIVE") return false;
        if (ownerUserId !== currentUserId) return false;

        return rank === "A" || rank === "K";
      });

      const hasVisibleGamePlays = plays.some((play) => {
        const playCode = String(play?.play_code || "");
        const parts = playCode.split("§");

        const rank = String(play?.card_rank || parts[3] || "").toUpperCase();
        const status = String(play?.play_status || "").toUpperCase();
        const action = String(parts[5] || "").toLowerCase();

        if (status !== "ACTIVE") return false;
        if (action === "init_ace" || action === "puedejugar") return false;

        return rank === "J" || rank === "Q";
      });

      if (hasCorporateAccess && !hasVisibleGamePlays) {
        if (tableroEl) tableroEl.style.display = "none";
        if (playformEl) playformEl.style.display = "";

        document.dispatchEvent(new CustomEvent("mazobar:addJ"));
      }

      if (typeof bindLienzoDropZone === "function") {
        bindLienzoDropZone(deck.id);
      }

      if (typeof bindAdministradoresDropZone === "function") {
        bindAdministradoresDropZone(deck.id);
      }
    }

    async function initMazoPage() {
      const params = new URLSearchParams(window.location.search);
      const deckId = params.get("id");

      clearDeckView();
      await loadMazoPage(deckId);
    }

    document.addEventListener("plays:changed", async (event) => {
      const deckId =
        event?.detail?.deckId ||
        new URLSearchParams(window.location.search).get("id");

      if (!deckId) {
        console.warn("plays:changed sin deckId");
        return;
      }

      await loadMazoPage(deckId);
    });

    initMazoPage();
  </script>
</body>

</html>
