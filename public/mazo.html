<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/mazobar.css" />
  <link rel="stylesheet" href="/css/new-mazobar.css" />
  <link rel="stylesheet" href="/css/playform.css" />
  <link rel="stylesheet" href="/css/plays-view.css" />
</head>
<body>
  <div id="topbar-container"></div>

  <div id="new-mazobar-container"></div>
  <div id="mazobar-container"></div>
  <div id="playform-container"></div>
  <div id="mazo-records-container"></div>

  <script src="/js/new-mazobar.js"></script>
  <script src="/js/mazobar.js"></script>
  <script src="/js/playform.js"></script>
  <script src="/js/plays-view.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    async function fetchDeckById(deckId) {
      try {
        const response = await fetch(`/decks/${deckId}`);
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Error cargando mazo");
        }

        return data.deck;
      } catch (error) {
        console.error("Error trayendo deck:", error);
        return null;
      }
    }

    function clearCreateView() {
      const el = document.getElementById("new-mazobar-container");
      if (el) el.innerHTML = "";
    }

    function clearDeckView() {
      const ids = [
        "mazobar-container",
        "playform-container",
        "mazo-records-container"
      ];

      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = "";
      });
    }

    async function initMazoPage() {
      const params = new URLSearchParams(window.location.search);
      const view = params.get("view");
      const deckId = params.get("id");

      if (view === "create") {
        clearDeckView();

        if (typeof renderNewMazobar === "function") {
          renderNewMazobar();
        }
        return;
      }

      if (deckId) {
        clearCreateView();

        const deck = await fetchDeckById(deckId);

        if (!deck) {
          console.warn("No se pudo cargar el mazo");
          return;
        }

        if (typeof renderMazobar === "function") {
          renderMazobar("deck", deck);
        }

        if (typeof renderPlayform === "function") {
          renderPlayform(deck);
        }

        if (typeof renderPlaysView === "function") {
          renderPlaysView(deck);
        }

        return;
      }

      console.warn("Mazo sin parámetros");
    }

    initMazoPage();
  </script>
</body>
</html>
