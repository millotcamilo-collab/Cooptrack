<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/mazobar.css" />
  <link rel="stylesheet" href="/css/playform.css" />
  <link rel="stylesheet" href="/css/tablero.css" />
  <link rel="stylesheet" href="/css/Jcorazon.css" />
   <link rel="stylesheet" href="/css/users.css" />
</head>
<body>
  <div id="topbar-container"></div>
  <div id="mazobar-container"></div>
  <div id="tablero-container"></div>
  <div id="playform-container"></div>

  <script src="/js/mazobar.js"></script>
  <script src="/js/playform.js"></script>
  <script src="/js/icons.js"></script>
  <script src="/js/users.js"></script>
  <script src="/js/tablero.js"></script>
  <script src="/js/Jcorazon.js"></script>
  <script src="/js/Jtrebol.js"></script>
   <script src="/js/Jpica.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    window.API_BASE_URL = window.API_BASE_URL || "https://cooptrack-backend.onrender.com";

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    function getAuthHeaders(includeJson = false) {
      const token = getToken();
      const headers = {};

      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }

      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

    async function fetchDeckById(deckId) {
      try {
        const token = getToken();

        if (!token) {
          throw new Error("Token no encontrado");
        }

        const response = await fetch(`${API_BASE_URL}/decks/${deckId}`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Error cargando mazo");
        }

         return data.mazo || data.deck;
      } catch (error) {
        console.error("Error trayendo deck:", error);
        return null;
      }
    }

    async function fetchDeckState(deckId) {
  try {
    const token = getToken();

    if (!token) {
      throw new Error("Token no encontrado");
    }

    const response = await fetch(`${API_BASE_URL}/mazo/${deckId}/state`, {
      method: "GET",
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const rawText = await response.text();
    console.log("STATE RAW RESPONSE:", rawText);

    let data;
    try {
      data = JSON.parse(rawText);
    } catch (error) {
      console.error("No es JSON válido:", rawText);
      throw new Error("El backend devolvió HTML o error");
    }

    if (!response.ok || !data.ok) {
      throw new Error(data.error || "Error cargando estado del mazo");
    }

    return data;
  } catch (error) {
    console.error("Error trayendo estado del mazo:", error);

    // 👇 clave: devolvemos estructura mínima para que el tablero no muera
    return {
      plays: [],
      userId: null
    };
  }
}

    async function deletePlayRequest(playId) {
      try {
        const response = await fetch(`${API_BASE_URL}/plays/${playId}`, {
          method: "DELETE",
          headers: getAuthHeaders(false)
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error borrando play");
        }

        return true;
      } catch (error) {
        console.error("Error en deletePlayRequest:", error);
        throw error;
      }
    }
    function getDeckIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getCurrentUserIdFromToken() {
      const token = getToken();
      if (!token) return null;

      try {
        const payloadBase64 = token.split(".")[1];
        const payloadJson = atob(payloadBase64);
        const payload = JSON.parse(payloadJson);
        return payload.userId || null;
      } catch (error) {
        console.error("Error leyendo token:", error);
        return null;
      }
    }

    function buildChildDiamondPlayCode(deckId, userId) {
      const nowIso = new Date().toISOString();
      return `${deckId}§${userId}§${nowIso}§J§CLUB§child_expense§U:${userId}§child§U:${userId}`;
    }

    async function createChildDiamondPlay(parentPlayId) {
      const deckId = getDeckIdFromUrl();
      const userId = getCurrentUserIdFromToken();

      if (!deckId) {
        throw new Error("No se encontró deckId en la URL");
      }

      if (!userId) {
        throw new Error("No se encontró userId en el token");
      }

      const response = await fetch(`${API_BASE_URL}/plays`, {
        method: "POST",
        headers: getAuthHeaders(true),
        body: JSON.stringify({
          deck_id: Number(deckId),
          parent_play_id: Number(parentPlayId),
          play_code: buildChildDiamondPlayCode(deckId, userId),
          card_rank: "J",
          card_suit: "CLUB",
          play_status: "ACTIVE",
          text: ""
        })
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Error creando J♦ hija");
      }

      return data.play;
    }
    function clearDeckView() {
  const ids = [
    "mazobar-container",
    "playform-container",
    "tablero-container"
  ];

  ids.forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = "";
  });
}
    async function initMazoPage() {
  const params = new URLSearchParams(window.location.search);
  const deckId = params.get("id");

  clearDeckView();

  if (!deckId) {
    console.warn("Mazo sin id");
    return;
  }

  const [deck, state] = await Promise.all([
    fetchDeckById(deckId),
    fetchDeckState(deckId)
  ]);

  console.log("deck:", deck);
  console.log("state:", state);

  if (!deck) {
    console.warn("No se pudo cargar el mazo");
    return;
  }

  if (!state) {
    console.warn("No se pudo cargar el estado del mazo");
    return;
  }

  if (typeof renderMazobar === "function") {
    renderMazobar(deck, state.plays || [], state.userId);
  }

  if (typeof renderPlayform === "function") {
    renderPlayform(deck, state);
  }

  if (typeof renderTablero === "function") {
    renderTablero(deck, state.plays || [], state);
  }
}
document.addEventListener("tablero:change-suit", async (event) => {
  try {
    const playId = event.detail?.playId;
    const nextSuit = event.detail?.nextSuit;

    if (!playId || !nextSuit) return;

    console.log("TABLERO CHANGE SUIT", playId, nextSuit);

    await patchPlay(playId, {
      card_suit: nextSuit
    });

    await initMazoPage();
  } catch (error) {
    console.error("Error en tablero:change-suit", error);
  }
});

document.addEventListener("tablero:save-play", async (event) => {
  try {
    const playId = event.detail?.playId;
    if (!playId) return;

    console.log("TABLERO SAVE PLAY", playId);

    await initMazoPage();
  } catch (error) {
    console.error("Error en tablero:save-play", error);
  }
});

document.addEventListener("tablero:approve-play", async (event) => {
  try {
    const playId = event.detail?.playId;
    if (!playId) return;

    console.log("TABLERO APPROVE PLAY", playId);

    await patchPlay(playId, {
      play_status: "APPROVED"
    });

    await initMazoPage();
  } catch (error) {
    console.error("Error en tablero:approve-play", error);
  }
});

document.addEventListener("tablero:delete-play", async (event) => {
  try {
    const playId = event.detail?.playId;
    if (!playId) return;

    console.log("TABLERO DELETE PLAY", playId);

    await deletePlayRequest(playId);
    await initMazoPage();
  } catch (error) {
    console.error("Error en tablero:delete-play", error);
  }
});

document.addEventListener("tablero:cancel-play", async (event) => {
  try {
    const playId = event.detail?.playId;
    if (!playId) return;

    console.log("TABLERO CANCEL PLAY", playId);

    await initMazoPage();
  } catch (error) {
    console.error("Error en tablero:cancel-play", error);
  }
});
    
    document.addEventListener("plays:patch-requested", async (event) => {
      try {
        const playId = event.detail?.playId;
        const patch = event.detail?.patch;

        if (!playId || !patch) return;

        console.log("PATCH PLAY", playId, patch);

        await patchPlay(playId, patch);
        await initMazoPage();
      } catch (error) {
        console.error("Error en plays:patch-requested", error);
      }
    });

    document.addEventListener("plays:approve-requested", async (event) => {
      try {
        const playId = event.detail?.playId;
        if (!playId) return;

        console.log("APPROVE PLAY", playId);

        await patchPlay(playId, {
          play_status: "APPROVED"
        });

        await initMazoPage();
      } catch (error) {
        console.error("Error en plays:approve-requested", error);
      }
    });

    document.addEventListener("plays:transform-suit-requested", async (event) => {
      try {
        const playId = event.detail?.playId;
        const suit = event.detail?.suit;

        if (!playId || !suit) return;

        console.log("TRANSFORM SUIT", playId, suit);

        await patchPlay(playId, {
          card_suit: suit
        });

        await initMazoPage();
      } catch (error) {
        console.error("Error en plays:transform-suit-requested", error);
      }
    });

    document.addEventListener("plays:delete-requested", async (event) => {
      try {
        const playId = event.detail?.playId;
        if (!playId) return;

        console.log("DELETE PLAY", playId);

        await deletePlayRequest(playId);
        await initMazoPage();
      } catch (error) {
        console.error("Error en plays:delete-requested", error);
      }
    });
    
    document.addEventListener("plays:add-child-diamond-requested", async (event) => {
      try {
        const parentPlayId = event.detail?.parentPlayId;
        if (!parentPlayId) return;

        console.log("ADD CHILD DIAMOND", parentPlayId);

        await createChildDiamondPlay(parentPlayId);
        await initMazoPage();
      } catch (error) {
        console.error("Error en plays:add-child-diamond-requested", error);
      }
    });
    document.addEventListener("plays:deadline-requested", async (event) => {
      try {
        const playId = event.detail?.playId;
        if (!playId) return;

        console.log("DEADLINE REQUESTED", playId);
      } catch (error) {
        console.error("Error en plays:deadline-requested", error);
      }
    });

    document.addEventListener("plays:changed", async (event) => {
      const deckId = event.detail?.deckId;
      if (!deckId) return;

      console.log("REFRESCANDO MAZO", deckId);
      await initMazoPage();
    });

    initMazoPage();
  </script>
</body>
</html>
