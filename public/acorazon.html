<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A♥ - Nuevo mazo</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
  <link rel="stylesheet" href="/css/acorazon.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png">

  <script src="/js/topbar.js"></script>
</head>

<body>
  <div class="lienzo-page">
    <div id="topbar-container"></div>

    <div class="lienzo-grid ct-block" style="grid-template-columns: 1fr;">
      <div class="panel panel--split-top">
        <div class="panel-topbar panel-topbar--empty"></div>

        <div class="content colombes-content">
          <div class="colombes-editor">
            <div class="colombes-editor__card-wrap">
              <div class="ace-owner-card">
                <div class="ace-owner-card__corner ace-owner-card__corner--tl">
                  <span>A</span>
                  <span>♥</span>
                </div>

                <div class="ace-owner-card__body">
                  <div class="ace-owner-card__body">
  <img id="aceOwnerPhoto" class="ace-owner-card__photo" src="/assets/icons/singeta120.gif" alt="Propietario">
  <div id="aceOwnerNick" class="ace-owner-card__nick">Usuario</div>

  <div class="ace-owner-card__fields">
  <div class="ace-owner-card__field-row">
    <span class="ace-owner-card__suit">♥</span>
    <input id="deckName" class="ace-owner-card__input ace-owner-card__input--title"
      type="text" placeholder="Título del mazo" autocomplete="off">
  </div>

  <div class="ace-owner-card__field-row">
    <span class="ace-owner-card__suit">♦</span>

    <select id="deckCurrencyCode" class="ace-owner-card__input ace-owner-card__input--code">
      <option value="">---</option>
      <option value="UYU">UYU</option>
      <option value="ARS">ARS</option>
      <option value="CLP">CLP</option>
      <option value="BRL">BRL</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
    </select>

    <input id="deckCurrencyName" class="ace-owner-card__input ace-owner-card__input--currency"
      type="text" placeholder="Moneda" autocomplete="off">

    <button id="createDeckBtn" class="icon-btn ace-owner-card__save" type="button" title="Crear mazo">
      <img src="/assets/icons/salvar40.gif" alt="Crear mazo">
    </button>
  </div>
</div>

  <div id="statusMsg" class="ace-owner-card__status"></div>
</div>
                </div>

                <div class="ace-owner-card__corner ace-owner-card__corner--br">
                  <span>A</span>
                  <span>♥</span>
                </div>
              </div>
            </div>

            
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = window.API_BASE_URL || "https://cooptrack-backend.onrender.com";

    const DEFAULT_CURRENCY_NAMES = {
      UYU: "Peso uruguayo",
      ARS: "Peso argentino",
      CLP: "Peso chileno",
      BRL: "Real brasileño",
      USD: "Dólar estadounidense",
      EUR: "Euro"
    };

    const COUNTRY_TO_CURRENCY = {
      UY: { code: "UYU", name: "Peso uruguayo" },
      AR: { code: "ARS", name: "Peso argentino" },
      CL: { code: "CLP", name: "Peso chileno" },
      BR: { code: "BRL", name: "Real brasileño" },
      US: { code: "USD", name: "Dólar estadounidense" },
      ES: { code: "EUR", name: "Euro" }
    };

    function setStatus(message, isError = false) {
      const el = document.getElementById("statusMsg");
      if (!el) return;

      el.textContent = message || "";
      el.style.color = isError ? "#ffb3b3" : "#f5f5f5";
    }

    function syncCurrencyNameFromCode() {
      const codeEl = document.getElementById("deckCurrencyCode");
      const nameEl = document.getElementById("deckCurrencyName");

      const code = String(codeEl?.value || "").trim().toUpperCase();

      if (nameEl) {
        nameEl.value = DEFAULT_CURRENCY_NAMES[code] || "";
      }
    }

    async function fetchCurrentUser() {
      const token = localStorage.getItem("cooptrackToken");
      if (!token) return null;

      try {
        const response = await fetch(`${API_BASE_URL}/me`, {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.user) {
          return null;
        }

        return data.user;
      } catch (error) {
        console.error("Error cargando usuario:", error);
        return null;
      }
    }

    function applyUserToAce(user) {
      if (!user) return;

      const acePhotoEl = document.getElementById("aceOwnerPhoto");
      const aceNickEl = document.getElementById("aceOwnerNick");

      if (acePhotoEl) {
        acePhotoEl.src =
          user.profile_photo_url ||
          "/assets/icons/singeta120.gif";
      }

      if (aceNickEl) {
        aceNickEl.textContent =
          user.nickname ||
          user.full_name ||
          user.name ||
          "Usuario";
      }
    }

    function applyDefaultCurrencyFromUser(user) {
      if (!user) return;

      const country = String(user.country || "").toUpperCase();
      const currency = COUNTRY_TO_CURRENCY[country];

      if (!currency) return;

      const codeEl = document.getElementById("deckCurrencyCode");
      const nameEl = document.getElementById("deckCurrencyName");

      if (codeEl) codeEl.value = currency.code;
      if (nameEl) nameEl.value = currency.name;
    }

    async function createDeck() {
      const token = localStorage.getItem("cooptrackToken");

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      const name = String(document.getElementById("deckName")?.value || "").trim();
      const currencySymbol = String(document.getElementById("deckCurrencyCode")?.value || "").trim().toUpperCase();
      const currencyName = String(document.getElementById("deckCurrencyName")?.value || "").trim();

      if (!name) {
        setStatus("Falta el título del mazo", true);
        document.getElementById("deckName")?.focus();
        return;
      }

      if (!currencySymbol) {
        setStatus("Falta el símbolo de moneda", true);
        document.getElementById("deckCurrencyCode")?.focus();
        return;
      }

      try {
        setStatus("Creando mazo...");

        const response = await fetch(`${API_BASE_URL}/decks`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            name,
            currency_symbol: currencySymbol,
            currency_name: currencyName || null,
            joker_type: "RED"
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.mazo?.id) {
          setStatus(data?.error || "No se pudo crear el mazo", true);
          return;
        }

        window.location.href = `/mazo.html?id=${data.mazo.id}`;
      } catch (error) {
        console.error("Error creando mazo:", error);
        setStatus("Error de red al crear el mazo", true);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const user = await fetchCurrentUser();

      applyUserToAce(user);
      applyDefaultCurrencyFromUser(user);

      document.getElementById("deckCurrencyCode")
        ?.addEventListener("change", syncCurrencyNameFromCode);

      document.getElementById("createDeckBtn")
        ?.addEventListener("click", createDeck);
    });
  </script>
</body>
</html>
