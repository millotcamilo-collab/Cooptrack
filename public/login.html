<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CoopTrack</title>
  <link rel="stylesheet" href="/css/topbar.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 500px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .subtitle {
      margin-bottom: 24px;
      color: #6b7280;
      font-size: 14px;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111827;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #1f2937; }

    .message {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }

    .success { color: #065f46; }
    .error { color: #b91c1c; }

    .register-box {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }

    .register-link {
      display: block;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #d1d5db;
      color: #111827;
      background: #fff;
      margin-bottom: 10px;
    }

    .register-link:hover {
      background: #f9fafb;
    }
  </style>
</head>
<body>

  <div id="topbar-container"></div>

  <main class="page">
    <div class="card">
      <h1>Iniciar sesión</h1>
      <p class="subtitle">
        Entrá con tu email o teléfono y tu contraseña.
      </p>

      <form id="loginForm">
        <div class="field">
          <label>Email o teléfono</label>
          <input id="login" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" required>
        </div>

        <button type="submit">Entrar</button>
        <div id="msg" class="message"></div>
      </form>

      <div class="register-box">
        <a class="register-link" href="/activar-cuenta.html">Activar cuenta</a>
      </div>

    </div>
  </main>

  <script src="/js/topbar.js"></script>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      msg.className = "message";
      msg.textContent = "";

      const login = document.getElementById("login").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ login, password })
        });

        const data = await res.json();

        // LOGIN OK
        if (data.ok) {
          localStorage.setItem("cooptrackToken", data.token);
          localStorage.setItem("cooptrackUser", JSON.stringify(data.user));

          msg.className = "message success";
          msg.textContent = "Login correcto.";

          setTimeout(() => {
            window.location.href = "/";
          }, 800);

          return;
        }

        // USUARIO PENDIENTE
        if (data.code === "ACCOUNT_PENDING") {
          msg.className = "message error";
          msg.textContent = "Cuenta no activada. Redirigiendo...";

          setTimeout(() => {
            window.location.href = `/activar-cuenta.html?login=${encodeURIComponent(login)}`;
          }, 900);

          return;
        }

        // ERROR NORMAL
        msg.className = "message error";
        msg.textContent = data.error || "Login incorrecto.";

      } catch (err) {
        msg.className = "message error";
        msg.textContent = "Error de conexión.";
      }
    });
  </script>

</body>
</html>
