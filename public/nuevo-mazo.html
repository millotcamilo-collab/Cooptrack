<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Mazo</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: radial-gradient(circle, #145c44, #0f3d2e);
      color: white;
    }

    /* GRID */
    .lienzo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    /* PANEL */
    .panel {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 16px;
      height: 420px;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* CONTENIDO */
    .content {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 18px;
    }

    .colombes-editor__card-wrap,
    .amsterdam-pack-wrap {
      min-height: 120px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    /* CARTA */
    .card {
      height: 120px;
    }

    /* MANOJO */
    .pack {
      position: relative;
      width: 170px;
      height: 170px;
    }

    .pack img {
      position: absolute;
      height: 120px;
    }

    /* ORDEN */
    .joker-blue {
      left: 0;
      bottom: 0;
      z-index: 1;
    }

    .joker-red {
      left: 14px;
      bottom: 0;
      z-index: 2;
    }

    .spade {
      left: 28px;
      bottom: 0;
      z-index: 3;
    }

    .diamond {
      left: 42px;
      bottom: 0;
      z-index: 4;
    }

    .club {
      left: 56px;
      bottom: 0;
      z-index: 5;
    }

    /* FINAL (solo jokers) */
    .pack.jokers-only .joker-blue {
      left: 0;
      bottom: 0;
    }

    .pack.jokers-only .joker-red {
      left: 16px;
      bottom: 10px;
    }

    /* BOTON */
    button {
      margin: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }

    .colombes-content {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .colombes-editor {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
    }

    .colombes-editor__card-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .colombes-editor__form {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .colombes-editor__line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .colombes-editor__line--top {
      justify-content: flex-start;
    }

    .colombes-editor__line--bottom {
      justify-content: flex-start;
      padding-left: 32px;
    }

    .colombes-editor__rank {
      font-size: 25px;
      font-weight: 700;
      color: #d32f2f;
      line-height: 1;
    }

    .colombes-editor__suit {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .colombes-editor__input {
      border: 1px solid #bdbdbd;
      border-radius: 6px;
      background: #fff;
      color: #111;
      padding: 6px 8px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }

    .colombes-editor__input--title {
      min-width: 220px;
      width: 220px;
      font-weight: 600;
    }

    .colombes-editor__input--code {
      width: 70px;
      min-width: 70px;
      text-transform: uppercase;
      text-align: center;
    }

    .colombes-editor__input--currency {
      min-width: 170px;
      width: 170px;
    }

    .colombes-editor__save {
      background: transparent;
      border: none;
      padding: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
    }

    .colombes-editor__save img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .colombes-editor__save:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .colombes-editor__status {
      min-height: 20px;
      margin-top: 8px;
      font-size: 14px;
      color: #f5f5f5;
    }
  </style>
</head>

<body>

  <button onclick="start()">Crear mazo</button>

  <div class="lienzo-grid">

    <!-- COLOMBES -->
    <div class="panel">
      <div class="header">
        <img src="/assets/icons/singeta120.gif" width="40">
        <span>Usuario</span>
      </div>

      <div class="content colombes-content">
        <div class="colombes-editor">
          <div class="colombes-editor__card-wrap">
            <img src="/assets/icons/Acorazon.gif" class="card" alt="As de corazón">
          </div>

          <div class="colombes-editor__form">
            <div class="colombes-editor__line colombes-editor__line--top">
              <span class="colombes-editor__rank">A</span>
              <img src="/assets/icons/cor40.gif" class="colombes-editor__suit" alt="♥">

              <input id="deckName" class="colombes-editor__input colombes-editor__input--title" type="text"
                placeholder="Título del mazo" autocomplete="off">
            </div>

            <div class="colombes-editor__line colombes-editor__line--bottom">
              <img src="/assets/icons/dia40.gif" class="colombes-editor__suit" alt="♦">

              <select id="deckCurrencyCode" class="colombes-editor__input colombes-editor__input--code">
                <option value="">---</option>
                <option value="UYU">UYU</option>
                <option value="ARS">ARS</option>
                <option value="CLP">CLP</option>
                <option value="BRL">BRL</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>

              <input id="deckCurrencyName" class="colombes-editor__input colombes-editor__input--currency" type="text"
                placeholder="Peso uruguayo" autocomplete="off">

            </div>

            <div id="statusMsg" class="colombes-editor__status"></div>
          </div>

          <div class="colombes-editor__actions">
            <div class="lienzo-target-actions nuevo-mazo-target-actions">
              <button id="helpBtn" class="icon-btn" type="button" title="Ayuda" aria-label="Ayuda">
                <img src="/assets/icons/bastonRecortado80.gif" alt="Ayuda">
              </button>

              <button id="saveAllBtn" class="icon-btn" type="button" title="Aprobar" aria-label="Aprobar">
                <img src="/assets/icons/salvar40.gif" alt="Aprobar">
              </button>

              <button id="createDeckBtn" class="icon-btn" type="button" title="Guardar mazo" aria-label="Guardar mazo">
                <img src="/assets/icons/Sello40.gif" alt="Guardar mazo">
              </button>

              <button id="cancelBtn" class="icon-btn" type="button" title="Salir" aria-label="Salir">
                <img src="/assets/icons/exit80.gif" alt="Salir">
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- AMSTERDAM -->
    <div class="panel">
      <div class="header">
        <img src="/assets/icons/Compila60.gif" width="40">
        <span>Cooptrack server</span>
      </div>

      <div class="content">
        <div class="amsterdam-pack-wrap">
          <div id="pack" class="pack">
            <img src="/assets/icons/joker_blue.gif" class="joker-blue">
            <img src="/assets/icons/Joker.gif" class="joker-red">
            <img src="/assets/icons/Apike.gif" class="spade">
            <img src="/assets/icons/Adiamante.gif" class="diamond">
            <img src="/assets/icons/Atrebol.gif" class="club">
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>

    let done = false;

    function start() {
      if (done) return;

      const pack = document.getElementById("pack");
      const colombes = document.getElementById("colombes");

      const rectStart = pack.getBoundingClientRect();
      const rectEnd = colombes.getBoundingClientRect();

      const ghost = document.createElement("div");
      ghost.className = "pack";
      ghost.style.position = "fixed";
      ghost.style.left = rectStart.left + 28 + "px";
      ghost.style.top = rectStart.top + "px";
      ghost.style.zIndex = 9999;
      ghost.style.transition = "all 0.6s ease";

      ghost.innerHTML = `
    <img src="/assets/icons/Apike.gif" class="spade">
    <img src="/assets/icons/Adiamante.gif" class="diamond">
    <img src="/assets/icons/Atrebol.gif" class="club">
  `;

      document.body.appendChild(ghost);

      requestAnimationFrame(() => {
        ghost.style.left = rectEnd.left + "px";
        ghost.style.top = rectEnd.top + "px";
      });

      ghost.addEventListener("transitionend", () => {

        ghost.remove();

        /* COLOMBES FINAL */
        colombes.innerHTML = `
      <div class="pack">
        <img src="/assets/icons/Acorazon.gif" style="left:0px; z-index:1;">
        <img src="/assets/icons/Apike.gif" style="left:18px; z-index:2;">
        <img src="/assets/icons/Adiamante.gif" style="left:36px; z-index:3;">
        <img src="/assets/icons/Atrebol.gif" style="left:54px; z-index:4;">
      </div>
    `;

        /* AMSTERDAM FINAL */
        pack.className = "pack jokers-only";
        pack.innerHTML = `
      <img src="/assets/icons/joker_blue.gif" class="joker-blue">
      <img src="/assets/icons/Joker.gif" class="joker-red">
    `;

        done = true;

      }, { once: true });
    }

  </script>

</body>

</html>
