<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />

  <style>
    .create-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    .create-container h1 {
      margin-bottom: 20px;
    }

    .create-container input,
    .create-container textarea {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      font-size: 16px;
    }

    .create-container button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="topbar-container"></div>

  <div class="create-container">
    <h1>Crear nuevo mazo</h1>

    <input id="deckName" placeholder="Nombre del mazo" />
    <textarea id="deckDescription" placeholder="Descripción (opcional)"></textarea>

    <button id="createDeckBtn">Crear mazo</button>

    <p id="statusMsg"></p>
  </div>

  <script src="/js/topbar.js"></script>

  <script>
    const API_BASE_URL = "https://cooptrack-backend.onrender.com";

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    async function createDeck() {
      const name = document.getElementById("deckName").value.trim();
      const description = document.getElementById("deckDescription").value.trim();
      const statusMsg = document.getElementById("statusMsg");

      if (!name) {
        statusMsg.textContent = "El nombre es obligatorio";
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/decks`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getToken()}`
          },
          body: JSON.stringify({
            name,
            description
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error creando mazo");
        }

        statusMsg.textContent = "Mazo creado correctamente";

        // 🔥 ir al mazo recién creado
        window.location.href = `/mazo.html?id=${data.deck.id}`;

      } catch (error) {
        console.error(error);
        statusMsg.textContent = "Error al crear mazo";
      }
    }

    document.getElementById("createDeckBtn")
      .addEventListener("click", createDeck);
  </script>
</body>
</html>
