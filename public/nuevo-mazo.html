<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/help.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
  <link rel="stylesheet" href="/css/placard.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png">

  <style>
    .nuevo-mazo-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
      background: var(--lienzo-veil-bg);
      border: 1px solid var(--lienzo-veil-border);
      border-radius: 14px;
      box-sizing: border-box;
    }

    .nuevo-mazo-bar__left {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-start;
    }

    .nuevo-mazo-bar__photo-wrap {
      flex: 0 0 auto;
    }

    .nuevo-mazo-bar__photo {
      height: 66px;
      width: auto;
      max-width: 120px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      background: #f3f3f3;
      border: 1px solid #d8d8d8;
    }

    .nuevo-mazo-bar__center {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nuevo-mazo-bar__titleline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .nuevo-mazo-bar__rank {
      flex: 0 0 auto;
      font-size: 25px;
      font-weight: 700;
      color: #d32f2f;
      line-height: 1;
    }

    .nuevo-mazo-bar__heart,
    .nuevo-mazo-bar__diamond {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .nuevo-mazo-bar__title-input {
      min-width: 160px;
      flex: 0 1 320px;
      border: 1px solid #bdbdbd;
      border-radius: 6px;
      background: #fff;
      padding: 4px 8px;
      outline: none;
      font-size: 16px;
      font-weight: 600;
      color: #111;
    }

    .nuevo-mazo-bar__title-input::placeholder {
      color: #999;
      font-weight: 600;
    }

    .nuevo-mazo-bar__title-readonly {
      min-width: 0;
      flex: 0 1 auto;
      font-size: 16px;
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      white-space: nowrap;
    }

    .nuevo-mazo-bar__currency-block {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .nuevo-mazo-inline-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nuevo-mazo-inline-input {
      border: 1px solid #bdbdbd;
      border-radius: 6px;
      background: #fff;
      padding: 4px 8px;
      outline: none;
      font-size: 14px;
      color: #111;
      min-width: 140px;
    }

    .nuevo-mazo-inline-input--code {
      width: 70px;
      min-width: 70px;
      text-transform: uppercase;
      text-align: center;
    }

    .nuevo-mazo-inline-input--name {
      min-width: 160px;
    }

    .nuevo-mazo-inline-save {
      background: transparent;
      border: none;
      padding: 2px;
      margin-left: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
    }

    .nuevo-mazo-inline-save img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .nuevo-mazo-inline-save:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .nuevo-mazo-status {
      min-height: 20px;
      font-size: 14px;
    }

    .is-hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .nuevo-mazo-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .nuevo-mazo-bar__titleline {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <div id="topbar-container"></div>

  <main class="nuevo-mazo-page">
    <div class="page-container">
      <section class="nuevo-mazo-shell">

        <div class="nuevo-mazo-bar">
          <div class="nuevo-mazo-bar__left">
            <div class="nuevo-mazo-bar__photo-wrap">
              <img
                id="deckPhotoPreview"
                src="/assets/icons/sinPicture.gif"
                alt="Foto del mazo"
                class="nuevo-mazo-bar__photo"
              />
            </div>
          </div>

          <div class="nuevo-mazo-bar__center">
            <div class="nuevo-mazo-bar__titleline">
              <span class="nuevo-mazo-bar__rank">A</span>
              <img src="/assets/icons/cor40.gif" alt="♥" class="nuevo-mazo-bar__heart" />

              <div id="titleStep" class="nuevo-mazo-inline-step">
                <input
                  id="deckName"
                  class="nuevo-mazo-bar__title-input"
                  type="text"
                  placeholder="Título del mazo"
                  autocomplete="off"
                />
              </div>

              <div id="deckNameReadonly" class="nuevo-mazo-bar__title-readonly is-hidden"></div>

              <div id="imageStep" class="nuevo-mazo-inline-step">
                <input
                  id="deckImage"
                  class="nuevo-mazo-inline-input"
                  type="text"
                  placeholder="URL de imagen"
                  autocomplete="off"
                />
              </div>

              <div id="currencyStep" class="nuevo-mazo-inline-step">
                <img src="/assets/icons/dia40.gif" alt="♦" class="nuevo-mazo-bar__diamond" />

                <select id="deckCurrencyCode" class="nuevo-mazo-inline-input nuevo-mazo-inline-input--code">
                  <option value="">---</option>
                  <option value="UYU">UYU</option>
                  <option value="ARS">ARS</option>
                  <option value="CLP">CLP</option>
                  <option value="BRL">BRL</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                </select>

                <input
                  id="deckCurrencyName"
                  class="nuevo-mazo-inline-input nuevo-mazo-inline-input--name"
                  type="text"
                  placeholder="Peso uruguayo"
                  autocomplete="off"
                />
              </div>

              <button
                id="saveAllBtn"
                type="button"
                class="nuevo-mazo-inline-save"
                title="Confirmar datos"
                aria-label="Confirmar datos"
              >
                <img src="/assets/icons/salvar40.gif" alt="Guardar datos" />
              </button>

              <div id="currencyBlock" class="nuevo-mazo-bar__currency-block is-hidden">
                <img id="diamondIcon" src="/assets/icons/dia40.gif" alt="♦" class="nuevo-mazo-bar__diamond" />
                <span id="deckCurrencyCodeReadonly" class="nuevo-mazo-bar__currency-code-readonly"></span>
                <span id="deckCurrencyNameReadonly" class="nuevo-mazo-bar__currency-name-readonly"></span>
              </div>
            </div>

            <div id="statusMsg" class="nuevo-mazo-status"></div>
          </div>
        </div>

        <div class="lienzo-grid">
          <div id="amsterdam" class="lienzo-grid__right">
            <div class="lienzo-panel">
              <div class="lienzo-panel__header">
                <div class="lienzo-target-header">
                  <img id="userPhoto" class="lienzo-target-header__photo" />
                  <span id="userName" class="lienzo-target-header__name"></span>
                </div>
              </div>

              <div class="lienzo-panel__content">
                <div id="founder-target-zone" class="lienzo-card-wrap">
                  <img src="/assets/icons/Acorazon.gif" class="lienzo-card-image" />
                </div>
              </div>

              <div class="lienzo-panel__actions">
                <div class="lienzo-target-actions nuevo-mazo-target-actions">
                  <button id="helpBtn" class="icon-btn" type="button" title="Ayuda" aria-label="Ayuda">
                    <img src="/assets/icons/bastonRecortado80.gif" alt="Ayuda" />
                  </button>

                  <button
                    id="createDeckBtn"
                    class="icon-btn is-hidden"
                    type="button"
                    title="Guardar mazo"
                    aria-label="Guardar mazo"
                  >
                    <img src="/assets/icons/salvar40.gif" alt="Guardar" />
                  </button>

                  <button id="cancelBtn" class="icon-btn" type="button" title="Salir" aria-label="Salir">
                    <img src="/assets/icons/exit80.gif" alt="Salir" />
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div id="colombes" class="lienzo-grid__left">
            <div class="lienzo-panel lienzo-panel--source">
              <div class="lienzo-panel__header">
                <div class="lienzo-source-header">
                  <img src="/assets/icons/Compila60.gif" class="lienzo-source-header__photo" />
                  <span class="lienzo-source-header__name">Cooptrack server</span>
                </div>
              </div>

              <div class="lienzo-panel__content">
                <div class="lienzo-source-cards">
                  <div id="server-aces-stack" class="lienzo-source-stack">
                    <img src="/assets/icons/Apike.gif" class="lienzo-source-stack__card" style="left:0px;" />
                    <img src="/assets/icons/Adiamante.gif" class="lienzo-source-stack__card" style="left:18px;" />
                    <img src="/assets/icons/Atrebol.gif" class="lienzo-source-stack__card" style="left:36px;" />
                  </div>
                </div>
              </div>

              <div class="lienzo-panel__actions">
                <div class="lienzo-source-actions"></div>
              </div>
            </div>
          </div>
        </div>

      </section>
    </div>
  </main>

  <script src="/js/help.js"></script>
  <script src="/js/placard.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    const API_BASE_URL = "https://cooptrack-backend.onrender.com";

    const COUNTRY_TO_CURRENCY = {
      UY: { code: "UYU", name: "Peso uruguayo" },
      AR: { code: "ARS", name: "Peso argentino" },
      CL: { code: "CLP", name: "Peso chileno" },
      BR: { code: "BRL", name: "Real brasileño" },
      US: { code: "USD", name: "Dólar estadounidense" },
      ES: { code: "EUR", name: "Euro" }
    };

    const animationState = {
      founderAcesDelivered: false
    };

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    function getEl(id) {
      return document.getElementById(id);
    }

    function showEl(id) {
      const el = getEl(id);
      if (el) el.classList.remove("is-hidden");
    }

    function hideEl(id) {
      const el = getEl(id);
      if (el) el.classList.add("is-hidden");
    }

    function setStatus(message, isError = false) {
      const statusMsg = getEl("statusMsg");
      if (!statusMsg) return;
      statusMsg.textContent = message || "";
      statusMsg.style.color = isError ? "#b00020" : "#333";
    }

    function goBack() {
      window.location.href = "/index.html";
    }

    function setPhotoPreview(src) {
      const photo = getEl("deckPhotoPreview");
      if (!photo) return;

      const safeSrc = String(src || "").trim();
      photo.src = safeSrc || "/assets/icons/sinPicture.gif";
    }

    function animateFounderAcesToUser() {
      if (animationState.founderAcesDelivered) return;

      const source = document.getElementById("server-aces-stack");
      const target = document.getElementById("founder-target-zone");

      if (!source || !target) return;

      const sourceRect = source.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();

      const ghost = source.cloneNode(true);
      ghost.id = "server-aces-stack-ghost";
      ghost.style.position = "fixed";
      ghost.style.left = sourceRect.left + "px";
      ghost.style.top = sourceRect.top + "px";
      ghost.style.width = sourceRect.width + "px";
      ghost.style.height = sourceRect.height + "px";
      ghost.style.margin = "0";
      ghost.style.zIndex = "9999";
      ghost.style.pointerEvents = "none";
      ghost.style.transition = "all 600ms ease";

      document.body.appendChild(ghost);
      source.style.visibility = "hidden";

      const targetX = targetRect.left + (targetRect.width / 2) - (sourceRect.width / 2);
      const targetY = targetRect.top + (targetRect.height / 2) - (sourceRect.height / 2);

      requestAnimationFrame(() => {
        ghost.style.left = targetX + "px";
        ghost.style.top = targetY + "px";
        ghost.style.transform = "scale(1.02)";
      });

      ghost.addEventListener("transitionend", () => {
        if (ghost.parentNode) ghost.remove();
        animationState.founderAcesDelivered = true;
        renderFounderFourAcesStack();
      }, { once: true });
    }

    function renderServerNextActionsPanel() {
      return `
        <div class="lienzo-server-next">
          <div class="lienzo-server-next__item">
            <img src="/assets/icons/Sello40.gif" class="lienzo-server-next__icon" />
            <span class="lienzo-server-next__label">Aprobar J</span>
            <span class="lienzo-server-next__check">✓</span>
          </div>

          <div class="lienzo-server-next__item">
            <img src="/assets/icons/buzon60.gif" class="lienzo-server-next__icon" />
            <span class="lienzo-server-next__label">Enviar Q</span>
            <span class="lienzo-server-next__check">✓</span>
          </div>

          <div class="lienzo-server-next__item">
            <img src="/assets/icons/pistola60.gif" class="lienzo-server-next__icon" />
            <span class="lienzo-server-next__label">Despedir Q</span>
            <span class="lienzo-server-next__check">✓</span>
          </div>
        </div>
      `;
    }

    function renderFounderFourAcesStack() {
      const sourcePanel = document.querySelector(".lienzo-grid__left .lienzo-source-cards");
      const targetZone = document.getElementById("founder-target-zone");

      if (sourcePanel) {
        sourcePanel.innerHTML = renderServerNextActionsPanel();
      }

      if (!targetZone) return;

      targetZone.innerHTML = `
        <div class="lienzo-source-stack lienzo-source-stack--four">
          <img src="/assets/icons/Acorazon.gif" class="lienzo-source-stack__card" style="left:0px; z-index:0;" />
          <img src="/assets/icons/Adiamante.gif" class="lienzo-source-stack__card" style="left:18px;" />
          <img src="/assets/icons/Apike.gif" class="lienzo-source-stack__card" style="left:36px;" />
          <img src="/assets/icons/Atrebol.gif" class="lienzo-source-stack__card" style="left:54px;" />
        </div>
      `;
    }

    function commitAllStep() {
      const name = String(getEl("deckName")?.value || "").trim();
      const image = String(getEl("deckImage")?.value || "").trim();
      const code = String(getEl("deckCurrencyCode")?.value || "").trim().toUpperCase();
      const currencyName = String(getEl("deckCurrencyName")?.value || "").trim();

      if (!name) {
        setStatus("El título es obligatorio", true);
        getEl("deckName")?.focus();
        return;
      }

      if (code && code.length !== 3) {
        setStatus("El código de moneda debe tener 3 caracteres", true);
        getEl("deckCurrencyCode")?.focus();
        return;
      }

      getEl("deckNameReadonly").textContent = name;
      hideEl("titleStep");
      showEl("deckNameReadonly");

      setPhotoPreview(image);
      hideEl("imageStep");

      getEl("deckCurrencyCodeReadonly").textContent = code;
      getEl("deckCurrencyNameReadonly").textContent = currencyName;
      hideEl("currencyStep");
      showEl("currencyBlock");

      hideEl("saveAllBtn");
      showEl("createDeckBtn");

      setStatus("Listo para guardar");

      setTimeout(() => {
        animateFounderAcesToUser();
      }, 150);
    }

    async function loadDefaultCurrencyFromProfile() {
      const token = getToken();
      if (!token) return;

      try {
        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.user) return;

        const country = String(data.user.country || "").trim().toUpperCase();
        const currency = COUNTRY_TO_CURRENCY[country];

        const codeInput = getEl("deckCurrencyCode");
        const nameInput = getEl("deckCurrencyName");

        if (!codeInput || !nameInput) return;

        if (currency) {
          codeInput.value = currency.code;
          nameInput.value = currency.name;
        } else {
          codeInput.value = "";
          nameInput.value = "";
        }
      } catch (error) {
        console.error("No se pudo cargar la moneda por defecto:", error);
      }
    }

    async function createDeck() {
      const nameReadonly = getEl("deckNameReadonly");
      const imageInput = getEl("deckImage");
      const currencyCodeInput = getEl("deckCurrencyCode");
      const currencyNameInput = getEl("deckCurrencyName");

      const name = String(nameReadonly?.textContent || "").trim();
      const image = String(imageInput?.value || "").trim();
      const currencyCode = String(currencyCodeInput?.value || "").trim().toUpperCase();
      const currencyName = String(currencyNameInput?.value || "").trim();
      const token = getToken();

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      if (!name) {
        setStatus("El título es obligatorio", true);
        return;
      }

      if (currencyCode && currencyCode.length !== 3) {
        setStatus("El código de moneda debe tener 3 caracteres", true);
        return;
      }

      try {
        setStatus("Creando mazo...");

        const response = await fetch(`${API_BASE_URL}/decks`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            name,
            description: currencyName ? `Moneda:${currencyName}` : null,
            deck_image_url: image || null,
            currency_symbol: currencyCode || null,
            currency_name: currencyName || null
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error creando mazo");
        }

        const createdMazo = data.mazo || data.deck;

        if (!createdMazo || !createdMazo.id) {
          console.error("Respuesta completa del servidor:", data);
          throw new Error("La respuesta del servidor no trajo el mazo creado");
        }

        setStatus("Mazo creado correctamente");
        window.location.href = `/mazo.html?id=${createdMazo.id}`;
      } catch (error) {
        console.error("Error creando mazo:", error);
        setStatus(error.message || "Error al crear mazo", true);
      }
    }

    function loadCurrentUserIntoLienzo() {
      const user =
        window.__currentUser ||
        JSON.parse(localStorage.getItem("cooptrackUser") || "null");

      if (!user) return;

      const photoEl = document.getElementById("userPhoto");
      const nameEl = document.getElementById("userName");

      if (photoEl) {
        photoEl.src = user.profile_photo_url || "/assets/icons/singeta120.gif";
      }

      if (nameEl) {
        nameEl.textContent =
          user.nickname ||
          user.full_name ||
          user.name ||
          `Usuario ${user.id}`;
      }
    }

    function bindEvents() {
      getEl("createDeckBtn")?.addEventListener("click", createDeck);
      getEl("cancelBtn")?.addEventListener("click", goBack);

      getEl("helpBtn")?.addEventListener("click", () => {
        if (typeof window.openPlayHelp === "function") {
          window.openPlayHelp("A_HEART");
        }
      });

      getEl("saveAllBtn")?.addEventListener("click", commitAllStep);

      getEl("deckName")?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commitAllStep();
        }
      });

      getEl("deckImage")?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commitAllStep();
        }
      });

      getEl("deckCurrencyCode")?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commitAllStep();
        }
      });

      getEl("deckCurrencyName")?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commitAllStep();
        }
      });

      getEl("deckCurrencyCode")?.addEventListener("change", (event) => {
        const code = String(event.target.value || "").toUpperCase();

        const currencyMap = {
          UYU: "Peso uruguayo",
          ARS: "Peso argentino",
          CLP: "Peso chileno",
          BRL: "Real brasileño",
          USD: "Dólar estadounidense",
          EUR: "Euro"
        };

        const nameInput = getEl("deckCurrencyName");
        if (nameInput) {
          nameInput.value = currencyMap[code] || "";
        }
      });

      getEl("deckPhotoPreview")?.addEventListener("error", () => {
        setPhotoPreview("");
      });
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await loadDefaultCurrencyFromProfile();
      bindEvents();
      loadCurrentUserIntoLienzo();
      getEl("deckName")?.focus();
    });
  </script>
</body>
</html>
