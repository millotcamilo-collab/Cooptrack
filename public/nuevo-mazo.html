<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Mazo</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
  <link rel="stylesheet" href="/css/placard.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/nuevo-mazo.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png">

  <script src="/js/placard.js"></script>
  <script src="/js/topbar.js"></script>

  <style>

  </style>
</head>

<body>
  <div class="lienzo-page">
    <div id="topbar-container"></div>
    <div id="placard-container" class="ct-block"></div>
    <div class="lienzo-grid" class="ct-block">

      <!-- COLOMBES -->
      <div class="panel panel--split-top" id="colombes-panel">
        <div class="panel-topbar">
          <div class="panel-topbar__col panel-topbar__col--identity">
            <div class="lienzo-target-header lienzo-target-header--top">
              <span id="userNickname" class="lienzo-target-header__name">Usuario</span>
              <img id="userPhoto" class="lienzo-target-header__photo" src="/assets/icons/singeta120.gif" alt="Usuario">
            </div>
          </div>

          <div class="panel-topbar__col panel-topbar__col--actions">
            <div class="nuevo-mazo-target-actions nuevo-mazo-target-actions--top">
              <button id="helpBtn" class="icon-btn" type="button" title="Ayuda" aria-label="Ayuda">
                <img src="/assets/icons/bastonRecortado80.gif" alt="Ayuda">
              </button>

              <button id="saveAllBtn" class="icon-btn" type="button" title="Guardar datos" aria-label="Guardar datos">
                <img src="/assets/icons/salvar40.gif" alt="Guardar datos">
              </button>

              <button id="createDeckBtn" class="icon-btn is-hidden" type="button" title="Aprobar" aria-label="Aprobar">
                <img src="/assets/icons/Sello40.gif" alt="Aprobar">
              </button>

              <button id="sendJokerBlueBtn" class="icon-btn is-hidden" type="button" title="Solicitar Joker azul"
                aria-label="Solicitar Joker azul">
                <img src="/assets/icons/buzon60.gif" alt="Solicitar Joker azul">
              </button>

              <button id="cancelBtn" class="icon-btn" type="button" title="Salir" aria-label="Salir">
                <img src="/assets/icons/exit80.gif" alt="Salir">
              </button>
            </div>
          </div>
        </div>

        <div class="content colombes-content">
          <div class="colombes-editor">
            <div id="colombesCardZone" class="colombes-editor__card-wrap">
              <img src="/assets/icons/Acorazon.gif" class="card" alt="As de corazón">
            </div>

            <div id="colombesForm" class="colombes-editor__form">
              <div class="colombes-editor__line colombes-editor__line--top">
                <span class="colombes-editor__rank">A</span>
                <img src="/assets/icons/cor40.gif" class="colombes-editor__suit" alt="♥">

                <input id="deckName" class="colombes-editor__input colombes-editor__input--title" type="text"
                  placeholder="Título del mazo" autocomplete="off">
              </div>

              <div class="colombes-editor__line colombes-editor__line--bottom">
                <span aria-hidden="true"></span>

                <img src="/assets/icons/dia40.gif" class="colombes-editor__suit" alt="♦">

                <div style="display:flex; align-items:center; gap:8px;">
                  <select id="deckCurrencyCode" class="colombes-editor__input colombes-editor__input--code">
                    <option value="">---</option>
                    <option value="UYU">UYU</option>
                    <option value="ARS">ARS</option>
                    <option value="CLP">CLP</option>
                    <option value="BRL">BRL</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                  </select>

                  <input id="deckCurrencyName" class="colombes-editor__input colombes-editor__input--currency"
                    type="text" placeholder="Peso uruguayo" autocomplete="off">
                </div>
              </div>

              <div id="statusMsg" class="colombes-editor__status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- AMSTERDAM -->
      <div class="panel panel--split-top" id="amsterdam-panel">
        <!-- TOPBAR (solo identidad, sin acciones) -->
        <div class="panel-topbar panel-topbar--single">
          <div class="panel-topbar__col panel-topbar__col--identity">
            <div class="lienzo-source-header lienzo-source-header--top">
              <span class="lienzo-source-header__name">Cooptrack server</span>
              <img src="/assets/icons/Compila60.gif" class="lienzo-source-header__photo" alt="Cooptrack server">
            </div>
          </div>
        </div>

        <!-- CONTENIDO ORIGINAL (se mantiene) -->
        <div class="content">
          <div class="amsterdam-stage">

            <!-- IZQUIERDA: mazo -->
            <div class="amsterdam-stage__left">
              <div class="amsterdam-pack-wrap">
                <div id="pack" class="pack">
                  <img src="/assets/icons/joker_blue.gif" class="joker-blue">
                  <img src="/assets/icons/Joker.gif" class="joker-red">
                  <img src="/assets/icons/Apike.gif" class="spade">
                  <img src="/assets/icons/Adiamante.gif" class="diamond">
                  <img src="/assets/icons/Atrebol.gif" class="club">
                </div>
              </div>
            </div>

            <!-- DERECHA: checklist (SE QUEDA ACÁ) -->
            <div class="amsterdam-stage__right">
              <div id="serverNextPanel" class="server-next server-next--readonly">

                <label class="server-next__item">
                  <span class="server-next__fake-checkbox"></span>
                  <img src="/assets/icons/Sello40.gif" class="server-next__icon">
                  <span class="server-next__label">Aprobar J ♠ ♥ ♦ ♣</span>
                </label>

                <label class="server-next__item">
                  <span class="server-next__fake-checkbox"></span>
                  <img src="/assets/icons/buzon60.gif" class="server-next__icon">
                  <span class="server-next__label">Enviar Q ♠</span>
                </label>

                <label class="server-next__item">
                  <span class="server-next__fake-checkbox"></span>
                  <img src="/assets/icons/pistola60.gif" class="server-next__icon">
                  <span class="server-next__label">Despedir Q ♠</span>
                </label>

                <label class="server-next__item">
                  <span class="server-next__fake-checkbox"></span>
                  <img src="/assets/icons/Extra60.gif" class="server-next__icon">
                  <span class="server-next__label">Publicar A♥ J♥♠</span>
                </label>

              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let done = false;
    let deckPhotoUrl = "";
    let isEditingPlacardPhoto = false;
    let isBlueOnTop = false;

    function getPageMode() {
      const params = new URLSearchParams(window.location.search);
      return String(params.get("mode") || "create").trim().toLowerCase();
    }

    function getDeckIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return Number(params.get("deckId") || params.get("id") || 0);
    }

    function applyPageMode() {
      const mode = getPageMode();

      if (mode === "jokerblue") {
        hideEl("colombesForm");
        hideEl("saveAllBtn");
        hideEl("createDeckBtn");
        showEl("sendJokerBlueBtn");
        setStatus("Solicitud Joker azul lista para enviar.");
        return;
      }

      showEl("colombesForm");
      showEl("saveAllBtn");
      hideEl("createDeckBtn");
      hideEl("sendJokerBlueBtn");
    }

    function showEl(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.remove("is-hidden");
      }
    }

    function renderJokerBlueCardInColombes() {
      const zone = document.getElementById("colombesCardZone");
      if (!zone) return;

      zone.innerHTML = `
    <img src="/assets/icons/joker_blue.gif" class="card" alt="Joker azul">
  `;
    }

    function hideEl(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.add("is-hidden");
      }
    }

    const API_BASE_URL = "https://cooptrack-backend.onrender.com";
    const ADMIN_USER_ID = 1;

    function getToken() {
      return localStorage.getItem("cooptrackToken") || "";
    }

    function decodeJwtPayload(token) {
      try {
        const base64 = token.split(".")[1];
        if (!base64) return null;
        return JSON.parse(atob(base64));
      } catch (error) {
        console.error("No se pudo decodificar el token", error);
        return null;
      }
    }

    function buildJokerBluePlayCode(deckId, userId, nowIso) {
      return [
        deckId,
        userId,
        nowIso,
        "JOKER",
        "BLUE",
        "request_blue_joker",
        `U:${userId}`,
        "manual",
        `U:${ADMIN_USER_ID}`
      ].join("§");
    }

    async function handleSendJokerBlue() {
      const token = getToken();

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      const deckId = getDeckIdFromUrl();
      if (!deckId) {
        setStatus("Falta deckId para solicitar Joker azul", true);
        return;
      }

      const payload = decodeJwtPayload(token);
      const userId = Number(payload?.userId || 0);

      if (!userId) {
        setStatus("No se pudo identificar al solicitante", true);
        return;
      }

      try {
        setStatus("Enviando solicitud de Joker azul...");

        const now = new Date().toISOString();
        const playCode = buildJokerBluePlayCode(deckId, userId, now);

        const response = await fetch(`${API_BASE_URL}/plays`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            deck_id: deckId,
            parent_play_id: null,
            target_user_id: ADMIN_USER_ID,
            play_code: playCode,
            play_status: "PENDING",
            text: "Solicitud de Joker azul"
          })
        });

        const data = await response.json();

        if (!response.ok || !data?.ok) {
          setStatus(data?.error || "No se pudo enviar la solicitud", true);
          return;
        }

        setStatus("Solicitud de Joker azul enviada.");
        window.location.href = `/mazo.html?id=${deckId}`;
      } catch (error) {
        console.error("Error solicitando Joker azul:", error);
        setStatus("Error de red al solicitar Joker azul", true);
      }
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("statusMsg");
      if (!el) return;

      el.textContent = message || "";
      el.style.color = isError ? "#ffb3b3" : "#f5f5f5";
    }

    const DEFAULT_CURRENCY_NAMES = {
      UYU: "Peso uruguayo",
      ARS: "Peso argentino",
      CLP: "Peso chileno",
      BRL: "Real brasileño",
      USD: "Dólar estadounidense",
      EUR: "Euro"
    };

    const COUNTRY_TO_CURRENCY = {
      UY: { code: "UYU", name: "Peso uruguayo" },
      AR: { code: "ARS", name: "Peso argentino" },
      CL: { code: "CLP", name: "Peso chileno" },
      BR: { code: "BRL", name: "Real brasileño" },
      US: { code: "USD", name: "Dólar estadounidense" },
      ES: { code: "EUR", name: "Euro" }
    };

    function syncCurrencyNameFromCode() {
      const codeEl = document.getElementById("deckCurrencyCode");
      const nameEl = document.getElementById("deckCurrencyName");

      if (!codeEl || !nameEl) return;

      const code = String(codeEl.value || "").trim().toUpperCase();
      const defaultName = DEFAULT_CURRENCY_NAMES[code] || "";

      nameEl.value = defaultName;
    }

    // 👇 PEGAR ACÁ
    function updateServerNextLabels() {
      const labels = document.querySelectorAll("#serverNextPanel .server-next__label");

      if (!labels.length) return;

      if (isBlueOnTop) {
        labels[0].textContent = "Aprobar J ♥ ♠ ♦ ♣";
        labels[1].textContent = "Enviar A, K, Q ♥ ♠ ♦ ♣";
        labels[2].textContent = "Despedir A, K, Q ♥ ♠ ♦ ♣";
        labels[3].textContent = "Publicar A♥ J♥ ♠ ♣";
      } else {
        labels[0].textContent = "Aprobar J ♥ ♠ ♦ ♣";
        labels[1].textContent = "Enviar Q ♠";
        labels[2].textContent = "Despedir Q ♠";
        labels[3].textContent = "Publicar A♥ J ♥ ♠";
      }
    }
    function renderFinalJokers() {
      const pack = document.getElementById("pack");
      if (!pack) return;

      pack.className = "pack jokers-only";

      pack.innerHTML = `
    <button
      id="jokerToggleBtn"
      type="button"
      class="joker-toggle-btn"
      aria-label="Cambiar orden de jokers"
      title="Cambiar orden de jokers"
    >
      ${isBlueOnTop
          ? `
            <img src="/assets/icons/Joker.gif" class="joker-red joker-red--bottom" alt="Joker rojo">
            <img src="/assets/icons/joker_blue.gif" class="joker-blue joker-blue--top" alt="Joker azul">
          `
          : `
            <img src="/assets/icons/joker_blue.gif" class="joker-blue joker-blue--bottom" alt="Joker azul">
            <img src="/assets/icons/Joker.gif" class="joker-red joker-red--top" alt="Joker rojo">
          `
        }
    </button>
  `;

      document.getElementById("jokerToggleBtn")?.addEventListener("click", () => {
        isBlueOnTop = !isBlueOnTop;
        renderFinalJokers();
        updateServerNextLabels();
      });
    }


    async function loadDefaultCurrencyFromProfile() {
      const token = localStorage.getItem("cooptrackToken");
      if (!token) return;

      try {
        const response = await fetch("https://cooptrack-backend.onrender.com/me", {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!data.ok || !data.user) return;

        const country = String(data.user.country || "").toUpperCase();
        const currency = COUNTRY_TO_CURRENCY[country];

        const codeEl = document.getElementById("deckCurrencyCode");
        const nameEl = document.getElementById("deckCurrencyName");

        if (!codeEl || !nameEl) return;

        if (currency) {
          codeEl.value = currency.code;
          nameEl.value = currency.name;
        }

      } catch (err) {
        console.error("Error cargando moneda:", err);
      }
    }

    async function loadUserHeader() {
      const token = localStorage.getItem("cooptrackToken");
      if (!token) return;

      try {
        const response = await fetch("https://cooptrack-backend.onrender.com/me", {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!data.ok || !data.user) return;

        const photoEl = document.getElementById("userPhoto");
        const nameEl = document.getElementById("userNickname");

        if (photoEl && data.user.profile_photo_url) {
          photoEl.src = data.user.profile_photo_url;
        }

        if (nameEl && data.user.nickname) {
          nameEl.textContent = data.user.nickname;
        }

      } catch (err) {
        console.error("Error cargando usuario:", err);
      }
    }

    function validateStepOne() {
      const deckName = String(document.getElementById("deckName")?.value || "").trim();
      const currencyCode = String(document.getElementById("deckCurrencyCode")?.value || "").trim();
      const currencyNameEl = document.getElementById("deckCurrencyName");

      if (!deckName) {
        setStatus("Falta el título del mazo", true);
        document.getElementById("deckName")?.focus();
        return false;
      }

      if (!currencyCode) {
        setStatus("Falta el símbolo de moneda", true);
        document.getElementById("deckCurrencyCode")?.focus();
        return false;
      }

      if (currencyNameEl && !String(currencyNameEl.value || "").trim()) {
        currencyNameEl.value = DEFAULT_CURRENCY_NAMES[currencyCode] || "";
      }

      setStatus("Datos listos. Ahora podés aprobar.");
      return true;
    }

    function enableServerNextPanel() {
      const panel = document.getElementById("serverNextPanel");
      if (!panel) return;

      panel.classList.remove("server-next--readonly");
      panel.classList.add("server-next--editable");
    }

    function bindServerNextClicks() {
      const panel = document.getElementById("serverNextPanel");
      if (!panel) return;

      const items = panel.querySelectorAll(".server-next__item");

      items.forEach((item) => {
        item.addEventListener("click", () => {
          if (!panel.classList.contains("server-next--editable")) return;

          item.classList.toggle("is-checked");
        });
      });
    }

    function handleSaveStepOne() {
      const ok = validateStepOne();
      if (!ok) return;

      const form = document.getElementById("colombesForm");
      if (form) form.classList.add("is-hidden");

      hideEl("saveAllBtn");

      const placardEl = document.getElementById("placard-container");
      if (placardEl) {
        placardEl.classList.remove("is-visible");
      }

      renderDeckPlacard();

      if (placardEl) {
        void placardEl.offsetWidth;
        placardEl.classList.add("is-visible");
      }

      start();
    }

    async function handleCreateDeck() {
      const token = localStorage.getItem("cooptrackToken");

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      const name = String(document.getElementById("deckName")?.value || "").trim();
      const currencySymbol = String(document.getElementById("deckCurrencyCode")?.value || "").trim().toUpperCase();
      const currencyName = String(document.getElementById("deckCurrencyName")?.value || "").trim();

      if (!name) {
        setStatus("Falta el título del mazo", true);
        return;
      }

      if (!currencySymbol) {
        setStatus("Falta el símbolo de moneda", true);
        return;
      }

      const jokerType = isBlueOnTop ? "BLUE" : "RED";

      try {
        setStatus("Guardando mazo...");

        const response = await fetch("https://cooptrack-backend.onrender.com/decks", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            name,
            deck_image_url: deckPhotoUrl || null,
            currency_symbol: currencySymbol,
            currency_name: currencyName || null,
            joker_type: jokerType
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.mazo?.id) {
          setStatus(data?.error || "No se pudo crear el mazo", true);
          return;
        }

        window.location.href = `/mazo.html?id=${data.mazo.id}`;
      } catch (error) {
        console.error("Error creando mazo:", error);
        setStatus("Error de red al crear el mazo", true);
      }
    }

    function renderDeckPlacard() {
      renderPlacard("placard-container", {
        deckPhotoUrl: deckPhotoUrl,
        rank: "A",
        suit: "HEART",
        title: document.getElementById("deckName")?.value,
        currencyCode: document.getElementById("deckCurrencyCode")?.value,
        currencyName: document.getElementById("deckCurrencyName")?.value,
        showCurrency: true,
        canEditPhoto: true,
        isEditingPhoto: isEditingPlacardPhoto,
        draftPhotoUrl: deckPhotoUrl
      });

      bindPlacardPhotoControls();
    }

    function bindPlacardPhotoControls() {
      const photoBtn = document.getElementById("placardPhotoBtn");
      const saveBtn = document.getElementById("placardPhotoSaveBtn");
      const cancelBtn = document.getElementById("placardPhotoCancelBtn");
      const input = document.getElementById("placardPhotoUrlInput");

      if (photoBtn) {
        photoBtn.addEventListener("click", () => {
          isEditingPlacardPhoto = true;
          renderDeckPlacard();
        });
      }

      if (saveBtn) {
        saveBtn.addEventListener("click", () => {
          deckPhotoUrl = String(input?.value || "").trim();
          isEditingPlacardPhoto = false;
          renderDeckPlacard();
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => {
          isEditingPlacardPhoto = false;
          renderDeckPlacard();
        });
      }
    }

    function checkAllServerNextItems() {
      const panel = document.getElementById("serverNextPanel");
      if (!panel) return;

      const items = panel.querySelectorAll(".server-next__item");
      items.forEach((item) => {
        item.classList.add("is-checked");
      });
    }

    function start() {
      if (done) return;

      const pack = document.getElementById("pack");
      const colombesCardZone = document.getElementById("colombesCardZone");

      if (!pack || !colombesCardZone) return;

      const packRect = pack.getBoundingClientRect();
      const targetRect = colombesCardZone.getBoundingClientRect();

      const ghost = document.createElement("div");
      ghost.className = "pack";
      ghost.style.position = "fixed";
      ghost.style.left = (packRect.left + 28) + "px";
      ghost.style.top = packRect.top + "px";
      ghost.style.width = "120px";
      ghost.style.height = "120px";
      ghost.style.zIndex = "9999";
      ghost.style.pointerEvents = "none";
      ghost.style.transition = "all 0.6s ease";

      ghost.innerHTML = `
    <img src="/assets/icons/Apike.gif" class="spade" alt="As de picas">
    <img src="/assets/icons/Adiamante.gif" class="diamond" alt="As de diamantes">
    <img src="/assets/icons/Atrebol.gif" class="club" alt="As de trébol">
  `;

      document.body.appendChild(ghost);

      requestAnimationFrame(() => {
        ghost.style.left = (targetRect.left + 18) + "px";
        ghost.style.top = targetRect.top + "px";
      });

      ghost.addEventListener("transitionend", () => {
        ghost.remove();

        colombesCardZone.innerHTML = `
      <div class="colombes-final-stack">
        <img src="/assets/icons/Acorazon.gif" class="colombes-final-stack__heart" alt="As de corazón">
        <img src="/assets/icons/Apike.gif" class="colombes-final-stack__spade" alt="As de picas">
        <img src="/assets/icons/Adiamante.gif" class="colombes-final-stack__diamond" alt="As de diamantes">
        <img src="/assets/icons/Atrebol.gif" class="colombes-final-stack__club" alt="As de trébol">
      </div>
    `;

        renderFinalJokers();

        enableServerNextPanel();
        checkAllServerNextItems();
        showEl("createDeckBtn");

        done = true;
      }, { once: true });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const mode = getPageMode();

      if (mode === "jokerblue") {
        isBlueOnTop = true;
      }

      applyPageMode();

      if (mode !== "jokerblue") {
        renderDeckPlacard();

        const placardEl = document.getElementById("placard-container");
        if (placardEl) {
          placardEl.classList.add("is-visible");
        }
      }

      if (mode === "jokerblue") {
        renderDeckPlacard();

        const placardEl = document.getElementById("placard-container");
        if (placardEl) {
          placardEl.classList.add("is-visible");
        }

        renderFinalJokers();
        updateServerNextLabels();
        enableServerNextPanel();
        checkAllServerNextItems();
      }

      await loadDefaultCurrencyFromProfile();
      await loadUserHeader();

      bindServerNextClicks();

      document.getElementById("sendJokerBlueBtn")?.addEventListener("click", handleSendJokerBlue);
      document.getElementById("saveAllBtn")?.addEventListener("click", handleSaveStepOne);
      document.getElementById("createDeckBtn")?.addEventListener("click", handleCreateDeck);
      document.getElementById("deckCurrencyCode")?.addEventListener("change", syncCurrencyNameFromCode);
    });

  </script>
</body>

</html>
