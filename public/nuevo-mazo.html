<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Mazo - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/help.css" />
<link rel="icon" type="image/png" href="/assets/icons/bigote.png">
  <style>
    .nuevo-mazo-page {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
    }

    .nuevo-mazo-box {
      width: 100%;
      max-width: 860px;
      margin: 18px auto 0;
      border: 1px dotted #777;
      padding: 12px 14px;
      background: transparent;
      box-sizing: border-box;
    }

    .nuevo-mazo-layout {
      display: grid;
      grid-template-columns: 170px 1fr;
      align-items: center;
      column-gap: 18px;
    }

    .nuevo-mazo-left {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 110px;
    }

    .nuevo-mazo-card-icon {
      height: 120px;
      width: auto;
      display: block;
    }

    .nuevo-mazo-right {
      display: flex;
      align-items: center;
    }

    .nuevo-mazo-form-table {
      width: 100%;
      border-collapse: collapse;
    }

    .nuevo-mazo-form-table td {
      padding: 4px 6px;
      vertical-align: middle;
    }

    .nuevo-mazo-label {
      width: 92px;
      font-size: 18px;
      color: #222;
      white-space: nowrap;
    }

    .nuevo-mazo-input {
      width: 100%;
      height: 28px;
      box-sizing: border-box;
      padding: 4px 8px;
      font-size: 16px;
      border: 1px solid #999;
      background: #fff;
    }

    .nuevo-mazo-input[readonly] {
      background: #f4f4f4;
      color: #333;
    }

    .nuevo-mazo-actions {
      white-space: nowrap;
      width: 150px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      padding: 0;
      margin: 0 4px 0 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn img {
      height: 24px;
      width: auto;
      display: block;
      transition: transform 0.12s ease;
    }

    .icon-btn:hover img {
      transform: scale(1.08);
    }

    .status-row td {
      padding-top: 8px;
    }

    .status-msg {
      min-height: 20px;
      font-size: 14px;
      color: #333;
    }

    @media (max-width: 700px) {
      .nuevo-mazo-layout {
        grid-template-columns: 1fr;
        row-gap: 10px;
      }

      .nuevo-mazo-left {
        justify-content: center;
      }

      .nuevo-mazo-form-table td {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }

      .nuevo-mazo-label {
        margin-bottom: 4px;
      }

      .nuevo-mazo-actions {
        width: auto;
        padding-top: 8px;
      }
    }
  </style>
</head>

<body>
  <div id="topbar-container"></div>

  <main class="nuevo-mazo-page">
    <div class="nuevo-mazo-box">
      <div class="nuevo-mazo-layout">
        <div class="nuevo-mazo-left">
          <img
            src="/assets/icons/Acorazon.gif"
            alt="A corazón"
            class="nuevo-mazo-card-icon"
          />
        </div>

        <div class="nuevo-mazo-right">
          <table class="nuevo-mazo-form-table">
            <tr>
              <td class="nuevo-mazo-label">Título</td>
              <td>
                <input
                  id="deckName"
                  class="nuevo-mazo-input"
                  type="text"
                  placeholder=""
                  autocomplete="off"
                />
              </td>
              <td class="nuevo-mazo-actions"></td>
            </tr>

            <tr>
              <td class="nuevo-mazo-label">Imagen</td>
              <td>
                <input
                  id="deckImage"
                  class="nuevo-mazo-input"
                  type="text"
                  placeholder="https://..."
                  autocomplete="off"
                />
              </td>
              <td></td>
            </tr>

            <tr>
              <td class="nuevo-mazo-label">Cod. mon.</td>
              <td>
                <input
                  id="deckCurrencyCode"
                  class="nuevo-mazo-input"
                  type="text"
                  value=""
                  maxlength="3"
                  autocomplete="off"
                  readonly
                />
              </td>
              <td class="nuevo-mazo-actions">
                <button
                  id="helpBtn"
                  class="icon-btn"
                  type="button"
                  title="Ayuda"
                  aria-label="Ayuda"
                >
                  <img src="/assets/icons/bastonRecortado80.gif" alt="Ayuda" />
                </button>

                <button
                  id="createDeckBtn"
                  class="icon-btn"
                  type="button"
                  title="Guardar mazo"
                  aria-label="Guardar mazo"
                >
                  <img src="/assets/icons/salvar40.gif" alt="Guardar" />
                </button>

                <button
                  id="cancelBtn"
                  class="icon-btn"
                  type="button"
                  title="Salir"
                  aria-label="Salir"
                >
                  <img src="/assets/icons/exit80.gif" alt="Salir" />
                </button>
              </td>
            </tr>

            <tr>
              <td class="nuevo-mazo-label">Moneda</td>
              <td>
                <input
                  id="deckCurrencyName"
                  class="nuevo-mazo-input"
                  type="text"
                  value=""
                  autocomplete="off"
                  readonly
                />
              </td>
              <td></td>
            </tr>

            <tr class="status-row">
              <td></td>
              <td>
                <div id="statusMsg" class="status-msg"></div>
              </td>
              <td></td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/help.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    const API_BASE_URL = "https://cooptrack-backend.onrender.com";

    const COUNTRY_TO_CURRENCY = {
      UY: { code: "UYU", name: "Peso uruguayo" },
      AR: { code: "ARS", name: "Peso argentino" },
      CL: { code: "CLP", name: "Peso chileno" },
      BR: { code: "BRL", name: "Real brasileño" },
      US: { code: "USD", name: "Dólar estadounidense" },
      ES: { code: "EUR", name: "Euro" }
    };

    function getToken() {
      return localStorage.getItem("cooptrackToken");
    }

    function getEl(id) {
      return document.getElementById(id);
    }

    function setStatus(message, isError = false) {
      const statusMsg = getEl("statusMsg");
      if (!statusMsg) return;

      statusMsg.textContent = message || "";
      statusMsg.style.color = isError ? "#b00020" : "#333";
    }

    function goBack() {
      window.location.href = "/index.html";
    }

    async function loadDefaultCurrencyFromProfile() {
      const token = getToken();
      if (!token) return;

      try {
        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.user) {
          return;
        }

        const country = String(data.user.country || "").trim().toUpperCase();
        const currency = COUNTRY_TO_CURRENCY[country];

        const codeInput = getEl("deckCurrencyCode");
        const nameInput = getEl("deckCurrencyName");

        if (!codeInput || !nameInput) return;

        if (currency) {
          codeInput.value = currency.code;
          nameInput.value = currency.name;
        } else {
          codeInput.value = "";
          nameInput.value = "";
        }
      } catch (error) {
        console.error("No se pudo cargar la moneda por defecto:", error);
      }
    }

    async function createDeck() {
      const nameInput = getEl("deckName");
      const imageInput = getEl("deckImage");
      const currencyCodeInput = getEl("deckCurrencyCode");
      const currencyNameInput = getEl("deckCurrencyName");

      const name = (nameInput?.value || "").trim();
      const image = (imageInput?.value || "").trim();
      const currencyCode = (currencyCodeInput?.value || "").trim().toUpperCase();
      const currencyName = (currencyNameInput?.value || "").trim();
      const token = getToken();

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      if (!name) {
        setStatus("El título es obligatorio", true);
        if (nameInput) nameInput.focus();
        return;
      }

      if (currencyCode && currencyCode.length !== 3) {
        setStatus("El código de moneda debe tener 3 caracteres", true);
        return;
      }

      try {
        setStatus("Creando mazo...");

        const response = await fetch(`${API_BASE_URL}/decks`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            name,
            description: currencyName ? `Moneda:${currencyName}` : null,
            deck_image_url: image || null,
            currency_symbol: currencyCode || null,
            currency_name: currencyName || null
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Error creando mazo");
        }

        const createdMazo = data.mazo || data.deck;

        if (!createdMazo || !createdMazo.id) {
          console.error("Respuesta completa del servidor:", data);
          throw new Error("La respuesta del servidor no trajo el mazo creado");
        }

        setStatus("Mazo creado correctamente");
        window.location.href = `/mazo.html?id=${createdMazo.id}`;
      } catch (error) {
        console.error("Error creando mazo:", error);
        setStatus(error.message || "Error al crear mazo", true);
      }
    }

    getEl("createDeckBtn")?.addEventListener("click", createDeck);
    getEl("cancelBtn")?.addEventListener("click", goBack);

    getEl("helpBtn")?.addEventListener("click", () => {
      if (typeof window.openPlayHelp === "function") {
        window.openPlayHelp("A_HEART");
      }
    });

    getEl("deckName")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        createDeck();
      }
    });

    getEl("deckImage")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        createDeck();
      }
    });

    getEl("deckCurrencyCode")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        createDeck();
      }
    });

    getEl("deckCurrencyName")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        createDeck();
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      const nameInput = getEl("deckName");
      if (nameInput) nameInput.focus();

      await loadDefaultCurrencyFromProfile();
    });
  </script>
</body>
</html>
