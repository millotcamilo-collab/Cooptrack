<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Mazo</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle, #145c44, #0f3d2e);
  color: white;
}

/* GRID */
.lienzo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

/* PANEL */
.panel {
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 16px;
  height: 420px;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* CONTENIDO */
.content {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding-top: 10px;
}

/* CARTA */
.card {
  height: 120px;
}

/* MANOJO */
.pack {
  position: relative;
  width: 170px;
  height: 170px;
}

.pack img {
  position: absolute;
  height: 120px;
}

/* ORDEN */
.joker-blue { left: 0; bottom: 0; z-index: 1; }
.joker-red { left: 14px; bottom: 10px; z-index: 2; }
.spade { left: 28px; bottom: 20px; z-index: 3; }
.diamond { left: 42px; bottom: 30px; z-index: 4; }
.club { left: 56px; bottom: 40px; z-index: 5; }

/* FINAL (solo jokers) */
.pack.jokers-only .joker-blue { left: 0; bottom: 0; }
.pack.jokers-only .joker-red { left: 16px; bottom: 10px; }

/* BOTON */
button {
  margin: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<button onclick="start()">Crear mazo</button>

<div class="lienzo-grid">

  <!-- COLOMBES -->
  <div class="panel">
    <div class="header">
      <img src="/assets/icons/singeta120.gif" width="40">
      <span>Usuario</span>
    </div>

    <div class="content" id="colombes">
      <img src="/assets/icons/Acorazon.gif" class="card">
    </div>
  </div>

  <!-- AMSTERDAM -->
  <div class="panel">
    <div class="header">
      <img src="/assets/icons/Compila60.gif" width="40">
      <span>Cooptrack server</span>
    </div>

    <div class="content">
      <div id="pack" class="pack">
        <img src="/assets/icons/joker_blue.gif" class="joker-blue">
        <img src="/assets/icons/Joker.gif" class="joker-red">
        <img src="/assets/icons/Apike.gif" class="spade">
        <img src="/assets/icons/Adiamante.gif" class="diamond">
        <img src="/assets/icons/Atrebol.gif" class="club">
      </div>
    </div>
  </div>

</div>

<script>

let done = false;

function start() {
  if (done) return;

  const pack = document.getElementById("pack");
  const colombes = document.getElementById("colombes");

  const rectStart = pack.getBoundingClientRect();
  const rectEnd = colombes.getBoundingClientRect();

  const ghost = document.createElement("div");
  ghost.className = "pack";
  ghost.style.position = "fixed";
  ghost.style.left = rectStart.left + 28 + "px";
  ghost.style.top = rectStart.top + "px";
  ghost.style.zIndex = 9999;
  ghost.style.transition = "all 0.6s ease";

  ghost.innerHTML = `
    <img src="/assets/icons/Apike.gif" class="spade">
    <img src="/assets/icons/Adiamante.gif" class="diamond">
    <img src="/assets/icons/Atrebol.gif" class="club">
  `;

  document.body.appendChild(ghost);

  requestAnimationFrame(() => {
    ghost.style.left = rectEnd.left + "px";
    ghost.style.top = rectEnd.top + "px";
  });

  ghost.addEventListener("transitionend", () => {

    ghost.remove();

    /* COLOMBES FINAL */
    colombes.innerHTML = `
      <div class="pack">
        <img src="/assets/icons/Acorazon.gif" style="left:0px; z-index:1;">
        <img src="/assets/icons/Apike.gif" style="left:18px; z-index:2;">
        <img src="/assets/icons/Adiamante.gif" style="left:36px; z-index:3;">
        <img src="/assets/icons/Atrebol.gif" style="left:54px; z-index:4;">
      </div>
    `;

    /* AMSTERDAM FINAL */
    pack.className = "pack jokers-only";
    pack.innerHTML = `
      <img src="/assets/icons/joker_blue.gif" class="joker-blue">
      <img src="/assets/icons/Joker.gif" class="joker-red">
    `;

    done = true;

  }, { once: true });
}

</script>

</body>
</html>
