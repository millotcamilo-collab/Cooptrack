<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración | CoopTrack</title>
 <link rel="stylesheet" href="/css/topbar.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h1, h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 22px;
      color: #6b7280;
      line-height: 1.5;
      font-size: 14px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }

    .primary-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary-btn:hover {
      background: #1f2937;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }

    .success {
      color: #065f46;
    }

    .error {
      color: #b91c1c;
    }

    .users-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .reload-btn {
      border: 1px solid #d1d5db;
      background: white;
      color: #111827;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .reload-btn:hover {
      background: #f9fafb;
    }

    .user-list {
      display: grid;
      gap: 12px;
    }

    .user-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .user-info {
      min-width: 0;
      flex: 1;
    }

    .user-name {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 16px;
      word-break: break-word;
    }

    .user-meta {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
      word-break: break-word;
    }

    .user-actions {
      flex-shrink: 0;
    }

    .delete-btn {
      border: none;
      background: #b91c1c;
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .delete-btn:hover {
      background: #991b1b;
    }

    .empty-state {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #6b7280;
      background: #fafafa;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .user-item {
        flex-direction: column;
        align-items: stretch;
      }

      .user-actions {
        width: 100%;
      }

      .delete-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="topbar-container"></div>

  <main class="page">
    <div class="layout">
      <section class="card">
        <h1>Crear cuenta</h1>
        <p class="subtitle">
          Registrá nuevos usuarios de prueba para CoopTrack.
        </p>

        <form id="registerForm">
          <div class="field">
            <label for="nickname">Nickname</label>
            <input id="nickname" required>
          </div>

          <div class="field">
            <label for="email">Email (opcional)</label>
            <input id="email" type="email">
          </div>

          <div class="field">
            <label for="phone">Teléfono (opcional)</label>
            <input id="phone">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" required>
          </div>

          <button class="primary-btn" type="submit">Crear cuenta</button>
          <div id="msg" class="message"></div>
        </form>
      </section>

      <section class="card">
        <div class="users-header">
          <h2>Usuarios registrados</h2>
          <button id="reloadUsersBtn" class="reload-btn" type="button">Recargar</button>
        </div>

        <div id="usersContainer" class="user-list"></div>
      </section>
      <section class="card">
        
        <div class="users-header">
        <h2>Solicitudes Joker azul</h2>
        <button id="reloadJokerBlueBtn" class="reload-btn" type="button">Recargar</button>
        </div>
        <div id="jokerBlueRequestsContainer" class="user-list"></div>
      </section>
    </div>
  </main>

  <script src="/js/topbar.js"></script>

  <script>
    const form = document.getElementById("registerForm");
    const msg = document.getElementById("msg");
    const usersContainer = document.getElementById("usersContainer");
    const reloadUsersBtn = document.getElementById("reloadUsersBtn");
    const jokerBlueRequestsContainer = document.getElementById("jokerBlueRequestsContainer");
    const reloadJokerBlueBtn = document.getElementById("reloadJokerBlueBtn");

    async function loadJokerBlueRequests() {
  jokerBlueRequestsContainer.innerHTML = `
    <div class="empty-state">
      Cargando solicitudes Joker azul...
    </div>
  `;

  try {
    const token = localStorage.getItem("cooptrackToken");

    if (!token) {
      jokerBlueRequestsContainer.innerHTML = `
        <div class="empty-state">
          No hay sesión iniciada.
        </div>
      `;
      return;
    }

    const res = await fetch("https://cooptrack-backend.onrender.com/admin/joker-blue-requests", {
      method: "GET",
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const data = await res.json();

    if (!data.ok || !Array.isArray(data.requests) || data.requests.length === 0) {
      jokerBlueRequestsContainer.innerHTML = `
        <div class="empty-state">
          No hay solicitudes pendientes de Joker azul.
        </div>
      `;
      return;
    }

    jokerBlueRequestsContainer.innerHTML = data.requests.map(req => {
      const photo = req.creator_profile_photo_url && req.creator_profile_photo_url.trim() !== ""
        ? req.creator_profile_photo_url
        : "/assets/icons/singeta120.gif";

      return `
        <div class="user-item">
          <div class="user-info" style="display:flex; gap:14px; align-items:center;">
            <img
              src="${escapeHtml(photo)}"
              alt="Foto usuario"
              style="width:56px; height:56px; border-radius:50%; object-fit:cover; border:1px solid #d1d5db;"
            />

            <div>
              <div class="user-name">
                ${escapeHtml(req.creator_nickname || "Sin nickname")}
              </div>

              <div class="user-meta">
                <div><strong>Mazo:</strong> ${escapeHtml(req.deck_name || "—")}</div>
                <div><strong>Play ID:</strong> ${escapeHtml(req.id)}</div>
                <div><strong>Estado:</strong> ${escapeHtml(req.play_status || "—")}</div>
                <div><strong>Fecha:</strong> ${escapeHtml(formatDate(req.created_at))}</div>
              </div>
            </div>
          </div>

          <div class="user-actions">
            <button
              class="reload-btn"
              type="button"
              onclick="alert('Luego programamos approve/reject para play ${req.id}')"
            >
              Ver
            </button>
          </div>
        </div>
      `;
    }).join("");
  } catch (error) {
    console.error("Error cargando solicitudes Joker azul:", error);

    jokerBlueRequestsContainer.innerHTML = `
      <div class="empty-state">
        Error cargando solicitudes Joker azul.
      </div>
    `;
  }
}
    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      if (!dateString) return "—";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return date.toLocaleString();
    }

    async function loadUsers() {
      usersContainer.innerHTML = `
        <div class="empty-state">
          Cargando usuarios...
        </div>
      `;

      try {
        const res = await fetch("/users");
        const data = await res.json();

        if (!data.ok || !data.users || data.users.length === 0) {
          usersContainer.innerHTML = `
            <div class="empty-state">
              No hay usuarios registrados.
            </div>
          `;
          return;
        }

        usersContainer.innerHTML = data.users.map(user => `
          <div class="user-item">
            <div class="user-info">
              <div class="user-name">
                #${user.id} - ${escapeHtml(user.nickname)}
              </div>

              <div class="user-meta">
                <div><strong>Email:</strong> ${escapeHtml(user.email || "—")}</div>
                <div><strong>Teléfono:</strong> ${escapeHtml(user.phone || "—")}</div>
                <div><strong>Tipo:</strong> ${escapeHtml(user.user_type || "—")}</div>
                <div><strong>Creado:</strong> ${escapeHtml(formatDate(user.created_at))}</div>
              </div>
            </div>

            <div class="user-actions">
              <button
                class="delete-btn"
                type="button"
                onclick="deleteUser(${user.id}, ${JSON.stringify(user.nickname)})"
              >
                Borrar
              </button>
            </div>
          </div>
        `).join("");
      } catch (error) {
        console.error("Error cargando usuarios:", error);

        usersContainer.innerHTML = `
          <div class="empty-state">
            Error cargando usuarios.
          </div>
        `;
      }
    }

    async function deleteUser(id, nickname) {
      const confirmed = confirm(`¿Seguro que querés borrar el usuario "${nickname}" (ID ${id})?`);

      if (!confirmed) {
        return;
      }

      try {
        const res = await fetch(`/users/${id}`, {
          method: "DELETE"
        });

        const data = await res.json();

        if (data.ok) {
          await loadUsers();
        } else {
          alert(data.error || "No se pudo borrar el usuario.");
        }
      } catch (error) {
        console.error("Error borrando usuario:", error);
        alert("Error de conexión al borrar usuario.");
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      msg.className = "message";
      msg.textContent = "";

      const nickname = document.getElementById("nickname").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/users", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nickname,
            email,
            phone,
            password
          })
        });

        const data = await res.json();

        if (data.ok) {
          msg.className = "message success";
          msg.textContent = "Usuario creado correctamente.";

          form.reset();
          loadUsers();
        } else {
          msg.className = "message error";
          msg.textContent = data.error || "Error al crear usuario.";
        }
      } catch (error) {
        console.error("Error creando usuario:", error);
        msg.className = "message error";
        msg.textContent = "Error de conexión con el servidor.";
      }
    });

    reloadUsersBtn.addEventListener("click", loadUsers);

    loadUsers();
  </script>

</body>
</html>
