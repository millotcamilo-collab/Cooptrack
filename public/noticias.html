<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CoopTrack · Noticias</title>
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png" />

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/bitacorabar.css" />
  <link rel="stylesheet" href="/css/placard.css" />
  <style>
    .noticias-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 20px 40px;
    }

    .noticias-card {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .noticias-card:hover {
      transform: scale(1.01);
      transition: transform 0.15s ease;
    }
  </style>

</head>

<body>
  <!-- TOPBAR -->
  <div id="topbar-container"></div>

  <!-- BITACORA BAR -->
  <div id="bitacorabar-container"></div>
  <main class="ct-page">
    <section id="noticias-list" class="noticias-list"></section>
  </main>
  <script>
    window.transversalBarConfig = {
      containerId: "bitacorabar-container",
      title: "Noticias",
      iconSrc: "/assets/icons/Extra120.gif",
      iconAlt: "Noticias",
      searchPlaceholder: "Buscar en noticias",
      filterEventName: "noticias:filterSuit",
      searchEventName: "noticias:search",
      filterPrefix: "noticias"
    };
  </script>

  <script src="/js/topbar.js"></script>
  <script src="/js/bitacorabar.js"></script>
  <script src="/js/placard.js"></script>
  <script src="/js/noticias.js"></script>

</body>

</html>
