<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png" />

  <style>
    .profile-page {
      max-width: 760px;
      margin: 5px auto;
      padding: 0 16px 40px;
    }

    .profile-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .user-category-icon {
      width: auto;
      height: 108px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .profile-avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ddd;
      background: #f5f5f5;
      flex: 0 0 auto;
      display: block;
    }

    .profile-avatar-button {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .profile-avatar-button:hover {
      transform: scale(1.02);
    }

    .profile-avatar-button:focus {
      outline: none;
    }

    .profile-title h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .profile-title p {
      margin: 0;
      color: #666;
    }

    .profile-avatar-editor {
      display: none;
      align-items: center;
      gap: 12px;
      margin: -6px 0 22px 100px;
    }

    .profile-avatar-editor.is-open {
      display: flex;
    }

    .profile-avatar-editor__input-wrap {
      flex: 1;
    }

    .profile-avatar-editor input {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      background: #fff;
    }

    .profile-fields {
      display: grid;
      gap: 5px;
    }

    .profile-field {
      border: 1px solid #e3e3e3;
      border-radius: 12px;
      padding: 14px 16px;
      background: #fcfcfc;
    }

    .profile-field__view {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      cursor: pointer;
    }

    .profile-field__view:hover {
      background: #f7f7f7;
      border-radius: 10px;
    }

    .profile-field__value {
      flex: 1;
      min-height: 24px;
      font-size: 17px;
      color: #111;
      word-break: break-word;
      padding: 6px 0;
    }

    .profile-field__value--empty {
      color: #999;
      font-style: italic;
    }

    .profile-field__edit-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      opacity: 0.8;
      flex: 0 0 auto;
    }

    .profile-field__edit {
      display: none;
      align-items: center;
      gap: 12px;
    }

    .profile-field.is-editing .profile-field__view {
      display: none;
    }

    .profile-field.is-editing .profile-field__edit {
      display: flex;
    }

    .profile-field__input-wrap {
      flex: 1;
    }

    .profile-field input,
    .profile-field select {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      background: #fff;
    }

    .profile-field__buttons {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      display: block;
    }

    .icon-btn:hover {
      transform: scale(1.05);
    }

    .status-message {
      margin-top: 18px;
      min-height: 24px;
      color: #333;
    }

    .profile-badges-row {
      display: flex;
      align-items: stretch;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .profile-badge-box {
      min-width: 110px;
      padding: 10px 14px;
      border: 1px solid #e3e3e3;
      border-radius: 12px;
      background: #fcfcfc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .profile-badge-box__label {
      font-size: 14px;
      color: #666;
      line-height: 1.1;
    }

    .profile-badge-box__value {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      line-height: 1;
    }

    .profile-badge-icon {
      width: auto;
      height: 25px;
      object-fit: contain;
    }

    @media (max-width: 640px) {
      .profile-avatar-editor {
        margin-left: 0;
        flex-direction: column;
        align-items: stretch;
      }

      .profile-field__edit {
        flex-direction: column;
        align-items: stretch;
      }

      .profile-field__buttons {
        justify-content: flex-end;
      }
    }
  </style>
</head>

<body>
  <div id="topbar-container"></div>

  <main class="profile-page">
    <section class="profile-card">
      <div class="profile-header">
        <img id="userCategoryIcon" class="user-category-icon" src="/assets/icons/guest80.gif" alt="Tipo de usuario" />

        <button type="button" id="profileAvatarButton" class="profile-avatar-button" title="Editar foto de perfil">
          <img id="profileAvatar" class="profile-avatar" src="/assets/icons/singeta120.gif" alt="Foto de perfil" />
        </button>

        <div class="profile-title">
          <div class="profile-title">
            <h1>Mi perfil</h1>
            <p>Datos personales de tu cuenta</p>

            <div class="profile-badges-row">
              <div class="profile-badge-box">
                <img src="/assets/icons/award60oro.gif" class="profile-badge-icon" />
                <div id="view-awards-count" class="profile-badge-box__value">0</div>
              </div>

              <div class="profile-badge-box">
                <img src="/assets/icons/ticket60.gif" class="profile-badge-icon" />
                <div id="view-complaints-count" class="profile-badge-box__value">0</div>
              </div>

              <div class="profile-badge-box">
                <img src="/assets/icons/bigote.png" class="profile-badge-icon" />
                <div id="view-moustaches-count" class="profile-badge-box__value">0</div>
              </div>
            </div>
          </div>
        </div>

        <div id="profileAvatarEditor" class="profile-avatar-editor">
          <div class="profile-avatar-editor__input-wrap">
            <input id="input-profile_photo_url" type="text" placeholder="URL de foto de perfil" />
          </div>

          <div class="profile-field__buttons">
            <button type="button" class="icon-btn" id="saveProfilePhotoBtn" title="Guardar">
              <img id="saveIcon-profile_photo_url" alt="Guardar" />
            </button>

            <button type="button" class="icon-btn" id="exitProfilePhotoBtn" title="Salir">
              <img id="exitIcon-profile_photo_url" alt="Salir" />
            </button>
          </div>
        </div>

        <section id="profileFields" class="profile-fields">
          <div class="profile-field" data-field="nickname">
            <div class="profile-field__view">
              <div id="view-nickname" class="profile-field__value">-</div>
              <img id="editIcon-nickname" class="profile-field__edit-icon" alt="Editar" />
            </div>

            <div class="profile-field__edit">
              <div class="profile-field__input-wrap">
                <input id="input-nickname" type="text" autocomplete="nickname" />
              </div>

              <div class="profile-field__buttons">
                <button type="button" class="icon-btn js-save-field" data-field="nickname" title="Guardar">
                  <img id="saveIcon-nickname" alt="Guardar" />
                </button>

                <button type="button" class="icon-btn js-cancel-field" data-field="nickname" title="Salir">
                  <img id="exitIcon-nickname" alt="Salir" />
                </button>
              </div>
            </div>
          </div>

          <div class="profile-field" data-field="email">
            <div class="profile-field__view">
              <div id="view-email" class="profile-field__value">Email</div>
              <img id="editIcon-email" class="profile-field__edit-icon" alt="Editar" />
            </div>

            <div class="profile-field__edit">
              <div class="profile-field__input-wrap">
                <input id="input-email" type="email" autocomplete="email" />
              </div>

              <div class="profile-field__buttons">
                <button type="button" class="icon-btn js-save-field" data-field="email" title="Guardar">
                  <img id="saveIcon-email" alt="Guardar" />
                </button>

                <button type="button" class="icon-btn js-cancel-field" data-field="email" title="Salir">
                  <img id="exitIcon-email" alt="Salir" />
                </button>
              </div>
            </div>
          </div>

          <div class="profile-field" data-field="phone">
            <div class="profile-field__view">
              <div id="view-phone" class="profile-field__value">Teléfono</div>
              <img id="editIcon-phone" class="profile-field__edit-icon" alt="Editar" />
            </div>

            <div class="profile-field__edit">
              <div class="profile-field__input-wrap">
                <input id="input-phone" type="text" autocomplete="tel" />
              </div>

              <div class="profile-field__buttons">
                <button type="button" class="icon-btn js-save-field" data-field="phone" title="Guardar">
                  <img id="saveIcon-phone" alt="Guardar" />
                </button>

                <button type="button" class="icon-btn js-cancel-field" data-field="phone" title="Salir">
                  <img id="exitIcon-phone" alt="Salir" />
                </button>
              </div>
            </div>
          </div>

          <div class="profile-field" data-field="birth_date">
            <div class="profile-field__view">
              <div class="profile-field__value">
                <strong>Fecha de nacimiento:</strong>
                <span id="view-birth_date">-</span>
              </div>

              <img id="editIcon-birth_date" class="profile-field__edit-icon" alt="Editar" />
            </div>

            <div class="profile-field__edit">
              <div class="profile-field__input-wrap">
                <input id="input-birth_date" type="date" autocomplete="bday" />
              </div>

              <div class="profile-field__buttons">
                <button type="button" class="icon-btn js-save-field" data-field="birth_date" title="Guardar">
                  <img id="saveIcon-birth_date" alt="Guardar" />
                </button>

                <button type="button" class="icon-btn js-cancel-field" data-field="birth_date" title="Salir">
                  <img id="exitIcon-birth_date" alt="Salir" />
                </button>
              </div>
            </div>
          </div>

          <div class="profile-field" data-field="country">
            <div class="profile-field__view">
              <div class="profile-field__value">
                <strong>País:</strong>
                <span id="view-country">-</span>
              </div>

              <img id="editIcon-country" class="profile-field__edit-icon" alt="Editar" />
            </div>

            <div class="profile-field__edit">
              <div class="profile-field__input-wrap">
                <select id="input-country" autocomplete="country">
                  <option value="">Seleccionar país</option>
                  <option value="UY">Uruguay</option>
                  <option value="AR">Argentina</option>
                  <option value="CL">Chile</option>
                  <option value="BR">Brasil</option>
                  <option value="US">Estados Unidos</option>
                  <option value="ES">España</option>
                </select>
              </div>

              <div class="profile-field__buttons">
                <button type="button" class="icon-btn js-save-field" data-field="country" title="Guardar">
                  <img id="saveIcon-country" alt="Guardar" />
                </button>

                <button type="button" class="icon-btn js-cancel-field" data-field="country" title="Salir">
                  <img id="exitIcon-country" alt="Salir" />
                </button>
              </div>
            </div>
          </div>
        </section>

        <div id="statusMessage" class="status-message"></div>
    </section>
  </main>

  <script src="/js/icons.js"></script>
  <script src="/js/topbar.js"></script>

  <script>
    const API_BASE_URL = "https://cooptrack-backend.onrender.com";
    const token = localStorage.getItem("cooptrackToken");

    if (!token) {
      window.location.href = "/login.html";
    }

    let currentUser = null;
    let editingField = null;

    function getEl(id) {
      return document.getElementById(id);
    }

    function authHeaders(extra = {}) {
      return {
        Authorization: `Bearer ${token}`,
        ...extra
      };
    }

    function setStatus(message, isError = false) {
      const el = getEl("statusMessage");
      if (!el) return;

      el.textContent = message || "";
      el.style.color = isError ? "#b00020" : "#333";
    }

    function getFallbackProfileImage() {
      return "/assets/icons/singeta120.gif";
    }

    function updateAvatar(url) {
      const avatar = getEl("profileAvatar");
      if (!avatar) return;

      const safeUrl = String(url || "").trim();

      avatar.onerror = () => {
        avatar.onerror = null;
        avatar.src = getFallbackProfileImage();
      };

      avatar.src = safeUrl || getFallbackProfileImage();
    }

    function updateUserCategoryIcon(user) {
      const icon = getEl("userCategoryIcon");
      if (!icon) return;

      const normalizedType = String(user?.user_type || "").toLowerCase();

      let iconSrc = "/assets/icons/guest80.gif";
      let altText = "Guest";

      if (normalizedType === "senior") {
        iconSrc = "/assets/icons/senior80.gif";
        altText = "Senior";
      } else if (normalizedType === "active") {
        iconSrc = "/assets/icons/activo80.gif";
        altText = "Active";
      }

      icon.src = iconSrc;
      icon.alt = altText;
    }

    function getSafeArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function renderProfileBadges(user) {
      const awardsEl = getEl("view-awards-count");
      const complaintsEl = getEl("view-complaints-count");
      const moustachesEl = getEl("view-moustaches-count");

      const awardsCount = getSafeArray(user?.awards).length;
      const complaintsCount = getSafeArray(user?.complaints).length;
      const moustachesCount = getSafeArray(user?.moustaches).length;

      if (awardsEl) awardsEl.textContent = String(awardsCount);
      if (complaintsEl) complaintsEl.textContent = String(complaintsCount);
      if (moustachesEl) moustachesEl.textContent = String(moustachesCount);
    }

    function getCountryLabel(code) {
      const map = {
        UY: "Uruguay",
        AR: "Argentina",
        CL: "Chile",
        BR: "Brasil",
        US: "Estados Unidos",
        ES: "España"
      };

      return map[code] || "";
    }

    function formatBirthDate(dateStr) {
      if (!dateStr) return "";

      const date = new Date(dateStr + "T00:00:00");
      if (Number.isNaN(date.getTime())) return dateStr;

      return date.toLocaleDateString("es-UY");
    }

    function formatFieldValue(field, value) {
      if (!value) return "";

      if (field === "birth_date") {
        return formatBirthDate(value);
      }

      if (field === "country") {
        return getCountryLabel(value);
      }

      return String(value);
    }

    function getEmptyPlaceholder(field) {
      const placeholders = {
        nickname: "Nickname",
        email: "Email",
        phone: "Teléfono",
        birth_date: "Fecha de nacimiento",
        country: "País",
        profile_photo_url: "Foto de perfil"
      };

      return placeholders[field] || "Sin dato";
    }

    function setViewValue(field, rawValue) {
      const viewEl = getEl(`view-${field}`);
      if (!viewEl) return;

      const formatted = formatFieldValue(field, rawValue);

      if (!formatted) {
        viewEl.textContent = getEmptyPlaceholder(field);
        viewEl.classList.add("profile-field__value--empty");
      } else {
        viewEl.textContent = formatted;
        viewEl.classList.remove("profile-field__value--empty");
      }
    }

    function setInputValue(field, rawValue) {
      const inputEl = getEl(`input-${field}`);
      if (!inputEl) return;
      inputEl.value = rawValue || "";
    }

    function applyIcons() {
      const fields = [
        "nickname",
        "email",
        "phone",
        "birth_date",
        "country"
      ];

      fields.forEach((field) => {
        const editIcon = getEl(`editIcon-${field}`);
        const saveIcon = getEl(`saveIcon-${field}`);
        const exitIcon = getEl(`exitIcon-${field}`);

        if (editIcon) editIcon.src = window.ICONS?.actions?.edit || "";
        if (saveIcon) saveIcon.src = window.ICONS?.actions?.save || "";
        if (exitIcon) exitIcon.src = window.ICONS?.actions?.exit || "";
      });

      const savePhotoIcon = getEl("saveIcon-profile_photo_url");
      const exitPhotoIcon = getEl("exitIcon-profile_photo_url");

      if (savePhotoIcon) savePhotoIcon.src = window.ICONS?.actions?.save || "";
      if (exitPhotoIcon) exitPhotoIcon.src = window.ICONS?.actions?.exit || "";
    }

    function openProfilePhotoEditor() {
      if (!currentUser) return;

      closeAllEditors();

      const editor = getEl("profileAvatarEditor");
      const input = getEl("input-profile_photo_url");

      if (editor) {
        editor.classList.add("is-open");
      }

      if (input) {
        input.value = currentUser.profile_photo_url || "";
        input.focus();
        input.select();
      }

      editingField = "profile_photo_url";
    }

    function closeProfilePhotoEditor() {
      const editor = getEl("profileAvatarEditor");
      if (editor) {
        editor.classList.remove("is-open");
      }

      editingField = null;
    }

    function cancelProfilePhotoEdit() {
      const input = getEl("input-profile_photo_url");
      if (input) {
        input.value = currentUser?.profile_photo_url || "";
      }

      updateAvatar(currentUser?.profile_photo_url || "");
      closeProfilePhotoEditor();
      setStatus("");
    }

    function renderProfile(user) {
      currentUser = { ...user };

      setViewValue("nickname", user.nickname || "");
      setViewValue("email", user.email || "");
      setViewValue("phone", user.phone || "");
      setViewValue("birth_date", user.birth_date || "");
      setViewValue("country", user.country || "");

      setInputValue("nickname", user.nickname || "");
      setInputValue("email", user.email || "");
      setInputValue("phone", user.phone || "");
      setInputValue("birth_date", user.birth_date || "");
      setInputValue("country", user.country || "");

      const photoInput = getEl("input-profile_photo_url");
      if (photoInput) {
        photoInput.value = user.profile_photo_url || "";
      }

      updateUserCategoryIcon(user);
      updateAvatar(user.profile_photo_url || "");
      renderProfileBadges(user);
    }

    function closeAllEditors() {
      document.querySelectorAll(".profile-field.is-editing").forEach((node) => {
        node.classList.remove("is-editing");
      });

      const avatarEditor = getEl("profileAvatarEditor");
      if (avatarEditor) {
        avatarEditor.classList.remove("is-open");
      }

      editingField = null;
    }

    function openEditor(field) {
      if (!currentUser) return;

      closeAllEditors();

      const fieldNode = document.querySelector(`.profile-field[data-field="${field}"]`);
      if (!fieldNode) return;

      setInputValue(field, currentUser[field] || "");
      fieldNode.classList.add("is-editing");
      editingField = field;

      const input = getEl(`input-${field}`);
      if (input) {
        input.focus();

        if (
          typeof input.select === "function" &&
          input.tagName === "INPUT" &&
          input.type !== "date"
        ) {
          input.select();
        }
      }
    }

    function cancelEdit(field) {
      if (!currentUser) return;

      if (field === "profile_photo_url") {
        cancelProfilePhotoEdit();
        return;
      }

      setInputValue(field, currentUser[field] || "");

      const fieldNode = document.querySelector(`.profile-field[data-field="${field}"]`);
      if (fieldNode) {
        fieldNode.classList.remove("is-editing");
      }

      editingField = null;
      setStatus("");
    }

    function getEditedValue(field) {
      const input = getEl(`input-${field}`);
      if (!input) return "";

      return typeof input.value === "string" ? input.value.trim() : "";
    }

    function buildPayloadWithField(field, value) {
      const mergedUser = {
        ...currentUser,
        [field]: value
      };

      return {
        nickname: (mergedUser.nickname || "").trim(),
        email: mergedUser.email ? String(mergedUser.email).trim() : null,
        phone: mergedUser.phone ? String(mergedUser.phone).trim() : null,
        birth_date: mergedUser.birth_date || null,
        country: mergedUser.country ? String(mergedUser.country).trim() : null,
        profile_photo_url: mergedUser.profile_photo_url
          ? String(mergedUser.profile_photo_url).trim()
          : null
      };
    }

    async function saveField(field) {
      if (!currentUser) return;

      const rawValue = getEditedValue(field);
      const normalizedValue = rawValue || "";

      if (field === "nickname" && !normalizedValue) {
        setStatus("El nombre visible es obligatorio", true);
        return;
      }

      try {
        setStatus("Guardando cambio...");

        const payload = buildPayloadWithField(field, normalizedValue);

        if (!payload.nickname) {
          setStatus("El nombre visible es obligatorio", true);
          return;
        }

        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "PUT",
          headers: authHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo guardar el perfil");
        }

        if (data.user) {
          currentUser = {
            ...currentUser,
            ...data.user
          };
          renderProfile(currentUser);
        } else {
          currentUser = {
            ...currentUser,
            [field]: normalizedValue || null
          };
          renderProfile(currentUser);
        }

        closeAllEditors();
        setStatus("Campo actualizado correctamente");
      } catch (error) {
        console.error(`Error guardando ${field}:`, error);
        setStatus("Error al guardar el cambio", true);
      }
    }

    function getStoredUser() {
      try {
        return JSON.parse(localStorage.getItem("cooptrackUser") || "null");
      } catch (error) {
        return null;
      }
    }

    async function loadProfile() {
      try {
        setStatus("Cargando perfil...");

        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "GET",
          headers: authHeaders()
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.user) {
          throw new Error(data.error || "No se pudo cargar el perfil");
        }

        renderProfile(data.user);
        localStorage.setItem("cooptrackUser", JSON.stringify(data.user));
        closeAllEditors();
        setStatus("");
      } catch (error) {
        console.error("Error cargando perfil:", error);

        const storedUser = getStoredUser();

        if (storedUser) {
          renderProfile(storedUser);
          setStatus("Perfil cargado desde datos locales");
          return;
        }

        setStatus("Error al cargar el perfil", true);
      }
    }

    function bindFieldEvents() {
      const avatarButton = getEl("profileAvatarButton");
      if (avatarButton) {
        avatarButton.addEventListener("click", () => {
          openProfilePhotoEditor();
        });
      }

      const savePhotoBtn = getEl("saveProfilePhotoBtn");
      if (savePhotoBtn) {
        savePhotoBtn.addEventListener("click", () => {
          saveField("profile_photo_url");
        });
      }

      const exitPhotoBtn = getEl("exitProfilePhotoBtn");
      if (exitPhotoBtn) {
        exitPhotoBtn.addEventListener("click", () => {
          cancelProfilePhotoEdit();
        });
      }

      const photoInput = getEl("input-profile_photo_url");
      if (photoInput) {
        photoInput.addEventListener("input", (event) => {
          updateAvatar(event.target.value);
        });

        photoInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            saveField("profile_photo_url");
          }

          if (event.key === "Escape") {
            event.preventDefault();
            cancelProfilePhotoEdit();
          }
        });
      }

      document.querySelectorAll(".profile-field__view").forEach((node) => {
        node.addEventListener("click", () => {
          const fieldNode = node.closest(".profile-field");
          const field = fieldNode?.dataset?.field;

          if (field) {
            openEditor(field);
          }
        });
      });

      document.querySelectorAll(".js-save-field").forEach((btn) => {
        btn.addEventListener("click", () => {
          const field = btn.dataset.field;

          if (field) {
            saveField(field);
          }
        });
      });

      document.querySelectorAll(".js-cancel-field").forEach((btn) => {
        btn.addEventListener("click", () => {
          const field = btn.dataset.field;

          if (field) {
            cancelEdit(field);
          }
        });
      });

      document.querySelectorAll(".profile-field input, .profile-field select").forEach((input) => {
        input.addEventListener("keydown", (event) => {
          const fieldNode = input.closest(".profile-field");
          const field = fieldNode?.dataset?.field;
          if (!field) return;

          if (event.key === "Enter") {
            event.preventDefault();
            saveField(field);
          }

          if (event.key === "Escape") {
            event.preventDefault();
            cancelEdit(field);
          }
        });
      });
    }

    applyIcons();
    bindFieldEvents();
    loadProfile();
  </script>
</body>

</html>
