<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />

  <style>
    .profile-page {
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px 40px;
    }

    .profile-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ddd;
      background: #f5f5f5;
    }

    .profile-title h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .profile-title p {
      margin: 0;
      color: #666;
    }

    .profile-form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: grid;
      gap: 6px;
    }

    .form-group label {
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .profile-actions button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #eee;
      color: #111;
    }

    .status-message {
      margin-top: 16px;
      min-height: 24px;
      color: #333;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="topbar-container"></div>

  <main class="profile-page">
    <section class="profile-card">
      <div class="profile-header">
        <img
          id="profileAvatar"
          class="profile-avatar"
          src="/assets/icons/singeta120.gif"
          alt="Foto de perfil"
        />

        <div class="profile-title">
          <h1>Mi perfil</h1>
          <p>Datos personales de tu cuenta</p>
        </div>
      </div>

      <form id="profileForm" class="profile-form">
        <div class="form-group">
          <label for="nickname">Nombre visible</label>
          <input id="nickname" name="nickname" type="text" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" />
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input id="phone" name="phone" type="text" />
        </div>

        <div class="form-group">
          <label for="birthDate">Fecha de nacimiento</label>
          <input id="birthDate" name="birthDate" type="date" />
        </div>

        <div class="form-group">
          <label for="userType">Tipo de usuario</label>
          <input id="userType" name="userType" type="text" disabled />
        </div>

        <div class="form-group">
          <label for="profilePhotoUrl">URL de foto de perfil</label>
          <input id="profilePhotoUrl" name="profilePhotoUrl" type="text" />
        </div>

        <div class="profile-actions">
          <button type="submit" class="btn-primary">Guardar cambios</button>
          <button type="button" id="reloadBtn" class="btn-secondary">Recargar</button>
        </div>

        <div id="statusMessage" class="status-message"></div>
      </form>
    </section>
  </main>

  <script src="/js/topbar.js"></script>

  <script>
    const API_BASE_URL = "https://cooptrack-backend.onrender.com";
    const token = localStorage.getItem("cooptrackToken");

    if (!token) {
      window.location.href = "/login.html";
    }

    function authHeaders(extra = {}) {
      return {
        Authorization: `Bearer ${token}`,
        ...extra
      };
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("statusMessage");
      if (!el) return;

      el.textContent = message || "";
      el.style.color = isError ? "#b00020" : "#333";
    }

    function getFallbackProfileImage() {
      return "/assets/icons/singeta120.gif";
    }

    function updateAvatar(url) {
      const avatar = document.getElementById("profileAvatar");
      if (!avatar) return;

      const safeUrl = (url || "").trim();
      avatar.src = safeUrl || getFallbackProfileImage();
    }

    function fillProfileForm(user) {
      document.getElementById("nickname").value = user.nickname || "";
      document.getElementById("email").value = user.email || "";
      document.getElementById("phone").value = user.phone || "";
      document.getElementById("birthDate").value = user.birth_date || "";
      document.getElementById("userType").value = user.user_type || "";
      document.getElementById("profilePhotoUrl").value = user.profile_photo_url || "";
      document.getElementById("country").value = user.country || "";
      updateAvatar(user.profile_photo_url);
    }

    async function loadProfile() {
      try {
        setStatus("Cargando perfil...");

        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "GET",
          headers: authHeaders()
        });

        const data = await response.json();

        if (!response.ok || !data.ok || !data.user) {
          throw new Error(data.error || "No se pudo cargar el perfil");
        }

        fillProfileForm(data.user);
        setStatus("");
      } catch (error) {
        console.error("Error cargando perfil:", error);
        setStatus("Error al cargar el perfil", true);
      }
    }

    async function saveProfile(event) {
      event.preventDefault();

      const nickname = document.getElementById("nickname").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const birthDate = document.getElementById("birthDate").value || null;
      const profilePhotoUrl = document.getElementById("profilePhotoUrl").value.trim();
      const country = document.getElementById("country").value.trim();

      if (!nickname) {
        setStatus("El nombre visible es obligatorio", true);
        return;
      }

      try {
        setStatus("Guardando cambios...");

        const response = await fetch(`${API_BASE_URL}/me`, {
          method: "PUT",
          headers: authHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            nickname,
            email: email || null,
            phone: phone || null,
            birth_date: birthDate,
            country: country || null,
            profile_photo_url: profilePhotoUrl || null
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo guardar el perfil");
        }

        if (data.user) {
          fillProfileForm(data.user);
        } else {
          updateAvatar(profilePhotoUrl);
        }

        setStatus("Perfil actualizado correctamente");
      } catch (error) {
        console.error("Error guardando perfil:", error);
        setStatus("Error al guardar el perfil", true);
      }
    }

    document.getElementById("profilePhotoUrl").addEventListener("input", (event) => {
      updateAvatar(event.target.value);
    });

    document.getElementById("reloadBtn").addEventListener("click", loadProfile);
    document.getElementById("profileForm").addEventListener("submit", saveProfile);

    loadProfile();
  </script>
</body>
</html>
