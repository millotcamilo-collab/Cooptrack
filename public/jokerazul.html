<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker Azul | CoopTrack</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
</head>
<body>
  <div id="topbar-container"></div>

  <main class="lienzo-page">
    <div class="page-container">
      <section class="lienzo-panel">
        <div class="lienzo-panel__header">
         
        </div>

        <div class="lienzo-grid">
          <div class="lienzo-grid__left">
            <div class="lienzo-card-wrap">
              <img
                src="/assets/icons/joker_blue.gif"
                alt="Joker azul"
                class="lienzo-card-image"
              />
            </div>

            <div class="lienzo-card-text">
              Vigencia provisional: 6 meses.
            </div>
          </div>

          <div class="lienzo-grid__right">
            <section class="lienzo-panel">
              <div class="lienzo-panel__header">
                <div class="lienzo-panel__title">Solicitud</div>
                <div class="lienzo-panel__subtitle">
                  CoopTrack recibirá esta solicitud como jugada pendiente.
                </div>
              </div>

              <div class="lienzo-card-text">
                Precio provisional: 1 peso.
              </div>

              <div style="margin-top: 16px;">
                <button id="sendJokerBlueBtn">Send</button>
              </div>

              <div
                id="jokerBlueMsg"
                class="lienzo-card-text"
                style="margin-top: 14px;"
              ></div>
            </section>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/topbar.js"></script>
  <script src="/js/jokerazul.js"></script>
</body>
</html>
