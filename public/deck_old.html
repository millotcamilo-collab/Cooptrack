<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Deck - CoopTrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="/css/topbar.css" />

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#222;}
.page{max-width:1250px;margin:0 auto;padding:24px 16px 40px;}
.page-header{margin-bottom:20px;}
.page-header h1{margin:0 0 8px;font-size:32px;}
.page-header p{margin:0;color:#666;line-height:1.5;}
.hidden{display:none;}

.panel{
background:white;
border:1px solid #ddd;
border-radius:16px;
padding:20px;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.message{min-height:20px;margin-top:12px;font-size:14px;}
.message.success{color:#1c6b2f;}
.message.error{color:#b42318;}

.records-table-wrap{overflow-x:auto;}

.records-table{
width:100%;
border-collapse:collapse;
background:white;
border:1px solid #ddd;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
min-width:980px;
}

.records-table thead th{
text-align:left;
font-size:13px;
color:#667085;
background:#f8fafc;
border-bottom:1px solid #e5e7eb;
padding:12px 14px;
white-space:nowrap;
}

.records-table tbody td{
padding:12px 14px;
border-bottom:1px solid #eef2f7;
vertical-align:middle;
}

.records-table tbody tr:last-child td{border-bottom:none;}

.col-card{width:100px;white-space:nowrap;}
.col-description{min-width:280px;}
.col-diamond-card{width:90px;white-space:nowrap;}
.col-diamond-amount{width:140px;white-space:nowrap;}
.col-extra{min-width:240px;color:#555;font-size:14px;}
.col-actions{width:140px;text-align:right;white-space:nowrap;}

.card-badge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:56px;
padding:8px 10px;
border-radius:12px;
font-weight:bold;
border:1px solid #ddd;
background:#fff;
}

.heart,.diamond{color:#c62828;}
.club,.spade{color:#1f1f1f;}

.badge-heart{border-color:#ef9a9a;background:#fff8f8;}
.badge-club{border-color:#cfd8dc;background:#f9fbfc;}
.badge-spade{border-color:#cfd8dc;background:#f9fbfc;}
.badge-diamond{border-color:#f5b5b5;background:#fff8f8;}

.description-text{white-space:pre-wrap;line-height:1.45;}
.meta-lines{line-height:1.5;white-space:pre-wrap;}

.inline-input{
width:100%;
border:1px solid #bbb;
border-radius:10px;
padding:10px 12px;
font-size:14px;
font-family:inherit;
background:#fff;
}

.inline-input:focus{
outline:none;
border-color:#1f4fd1;
box-shadow:0 0 0 3px rgba(31,79,209,0.10);
}

.btn{
border:none;
border-radius:10px;
padding:10px 14px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{background:#1f4fd1;color:white;}
.btn-primary:hover{background:#183fa8;}
.btn-secondary{background:#eef2f7;color:#344054;}
.btn-secondary:hover{background:#e4e7ec;}

.btn-suit{
min-width:42px;
padding:8px 10px;
border-radius:10px;
border:1px solid #d0d5dd;
background:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-left:6px;
}

.btn-suit:hover{background:#f9fafb;}
.btn-heart{color:#c62828;}
.btn-diamond{color:#c62828;}
.btn-club,.btn-spade{color:#111827;}

.empty-state{
background:white;
border:1px dashed #bbb;
border-radius:16px;
padding:24px;
text-align:center;
color:#666;
}

.editor-layout{
display:grid;
grid-template-columns:280px 1fr;
gap:24px;
align-items:start;
}

.editor-card{
min-height:360px;
border-radius:18px;
padding:18px;
background:white;
border:2px solid #ddd;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.editor-card.card-heart{border-color:#ef9a9a;background:linear-gradient(180deg,#fff,#fff8f8);}
.editor-card.card-club{border-color:#cfd8dc;background:linear-gradient(180deg,#fff,#f9fbfc);}
.editor-card.card-spade{border-color:#cfd8dc;background:linear-gradient(180deg,#fff,#f9fbfc);}

.editor-top,.editor-bottom{
display:flex;
align-items:center;
justify-content:space-between;
font-weight:bold;
font-size:24px;
}

.editor-center{text-align:center;padding:12px 0;}
.editor-suit-big{font-size:54px;margin-bottom:12px;}
.editor-caption{font-size:16px;color:#555;}

.field{margin-bottom:14px;}

.field label{
display:block;
font-size:14px;
font-weight:bold;
margin-bottom:6px;
}

.field input,.field textarea{
width:100%;
padding:10px 12px;
border:1px solid #bbb;
border-radius:10px;
font-size:14px;
background:#fff;
font-family:inherit;
}

.field textarea{min-height:120px;resize:vertical;}

.editor-actions{display:flex;gap:10px;margin-top:16px;}
.editor-actions .btn{min-width:110px;}

.editor-note{margin-bottom:16px;color:#666;line-height:1.5;}

@media (max-width:900px){
.editor-layout{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="topbar-container"></div>

<div class="page">

<div class="page-header">
<h1 id="deckTitle">Deck</h1>
<p id="deckDescription"></p>

<div style="margin-top:16px;">
<a id="openBoardLink"
href="#"
class="btn btn-primary"
style="display:inline-block;text-decoration:none;">
Autoridades
</a>
</div>

</div>

<section id="listView">
<div id="listContainer"></div>
<div id="listMsg" class="message"></div>
</section>

<section id="editorView" class="hidden">
<div class="panel">

<div class="editor-layout">

<div id="editorCardPreview"></div>

<div>

<h2 id="editorTitle">Editar carta</h2>
<p id="editorSubtitle" class="editor-note"></p>

<div id="clubEditor" class="hidden">

<div class="field">
<label for="clubDescription">Descripción</label>
<textarea id="clubDescription"></textarea>
</div>

<div class="field">
<label for="clubAmount">Monto</label>
<input id="clubAmount" type="number" step="any">
</div>

</div>

<div id="spadeEditor" class="hidden">

<div class="field">
<label for="spadeDescription">Descripción</label>
<textarea id="spadeDescription"></textarea>
</div>

<div class="field">
<label for="spadeStart">Inicio</label>
<input id="spadeStart" type="datetime-local">
</div>

<div class="field">
<label for="spadeEnd">Fin</label>
<input id="spadeEnd" type="datetime-local">
</div>

<div class="field">
<label for="spadeLocation">Lugar</label>
<input id="spadeLocation">
</div>

<div class="field">
<label for="spadeAmount">Monto</label>
<input id="spadeAmount" type="number" step="any">
</div>

</div>

<div class="editor-actions">
<button id="saveEditBtn" class="btn btn-primary">Salvar</button>
<button id="cancelEditBtn" class="btn btn-secondary">Cancelar</button>
</div>

<div id="editorMsg" class="message"></div>

</div>
</div>

</div>
</section>

</div>

<script src="/js/auth.js"></script>
<script src="/js/topbar.js"></script>

<script>

/* PARAMETROS */

const params = new URLSearchParams(window.location.search);
const deckId = params.get("id");

/* AUTH */

const user = JSON.parse(localStorage.getItem("cooptrackUser"));
const token = localStorage.getItem("cooptrackToken");

if (!user || !token) {
window.location.href = "/login.html";
}

/* DOM */

const deckTitle = document.getElementById("deckTitle");
const deckDescription = document.getElementById("deckDescription");
const listContainer = document.getElementById("listContainer");
const listMsg = document.getElementById("listMsg");
const editorView = document.getElementById("editorView");
const listView = document.getElementById("listView");
const editorCardPreview = document.getElementById("editorCardPreview");
const editorTitle = document.getElementById("editorTitle");
const editorSubtitle = document.getElementById("editorSubtitle");
const editorMsg = document.getElementById("editorMsg");
const clubEditor = document.getElementById("clubEditor");
const spadeEditor = document.getElementById("spadeEditor");

/* BOTON Autoridades = Tablero(nombre viejo) */

const openBoardLink = document.getElementById("openBoardLink");

if (openBoardLink && deckId) {
openBoardLink.href = `/tablero.html?id=${deckId}`;
}

/* RESTO DEL SCRIPT SIGUE IGUAL */

let records = [];
let currentEditRecord = null;
let currentEditTarget = null;

/* ... el resto de tu JS sigue exactamente igual ... */

</script>

</body>
</html>
