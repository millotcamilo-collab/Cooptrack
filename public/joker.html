<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joker</title>

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/lienzo.css" />
  <link rel="stylesheet" href="/css/placard.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/joker.css" />
  <link rel="icon" type="image/png" href="/assets/icons/bigote.png">

  <script src="/js/placard.js"></script>
  <script src="/js/topbar.js"></script>
</head>

<body>
  <div class="lienzo-page">
    <div id="topbar-container"></div>
    <div id="placard-container" class="ct-block is-hidden"></div>

    <div class="lienzo-grid ct-block joker-grid">
      <div class="panel panel--split-top" id="joker-panel">
        <div class="content">
          <div class="joker-stage">

            <div class="joker-stage__left">

              <div id="jokerPlanOptions" class="joker-plan-options">
                <button class="joker-plan-option is-selected" data-months="1">
                  <span>1</span>
                  <small>mes</small>
                </button>

                <button class="joker-plan-option" data-months="6">
                  <span>6</span>
                  <small>meses</small>
                </button>

                <button class="joker-plan-option" data-months="12">
                  <span>12</span>
                  <small>meses</small>
                </button>
              </div>

              <div class="joker-pack-wrap">
                <div id="pack" class="pack jokers-only" aria-label="Selector de Joker"></div>
              </div>

            </div>

            <div class="joker-stage__right">
              <div id="serverNextPanel" class="server-next server-next--readonly is-hidden">

                <div id="serverPlanLabel" class="server-plan-label">
                  Gratis
                </div>

                <label class="server-next__item">
                  <img src="/assets/icons/Sello40.gif" class="server-next__icon" alt="">
                  <span class="server-next__label">Aprobar J ♥ ♠ ♦ ♣</span>
                </label>

                <label class="server-next__item">
                  <img src="/assets/icons/buzon60.gif" class="server-next__icon" alt="">
                  <span class="server-next__label">Enviar Q ♠</span>
                </label>

                <label class="server-next__item">
                  <img src="/assets/icons/pistola60.gif" class="server-next__icon" alt="">
                  <span class="server-next__label">Despedir Q ♠</span>
                </label>

                <label class="server-next__item">
                  <img src="/assets/icons/Extra60.gif" class="server-next__icon" alt="">
                  <span class="server-next__label">Publicar A♥ J ♥ ♠</span>
                </label>



                <div id="statusMsg" class="joker-status"></div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let deckPhotoUrl = "";
    let deckTitle = "Mazo";
    let deckCurrencyCode = "";
    let deckCurrencyName = "";
    let isEditingPlacardPhoto = false;
    let isBlueOnTop = false;

    let selectedJokerMonths = 1;
    let currentJokerPlayId = 0;

    let jokerBlueActive = false;

    function updateJokerPlanOptions() {
      const plans = document.getElementById("jokerPlanOptions");

      if (!plans) return;

      plans.style.display =
        isBlueOnTop && !jokerBlueActive
          ? "flex"
          : "none";
    }

    const API_BASE_URL = "https://cooptrack-backend.onrender.com";
    const ADMIN_USER_ID = 1;

    function getDeckIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return Number(params.get("deckId") || params.get("id") || 0);
    }

    function getJokerPlayIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return Number(params.get("jokerPlayId") || params.get("playId") || 0);
    }

    function getToken() {
      return localStorage.getItem("cooptrackToken") || "";
    }

    function showEl(id) {
      document.getElementById(id)?.classList.remove("is-hidden");
    }

    function hideEl(id) {
      document.getElementById(id)?.classList.add("is-hidden");
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("statusMsg");
      if (!el) return;

      el.textContent = message || "";
      el.style.color = isError ? "#ffb3b3" : "#f5f5f5";
    }

    function decodeJwtPayload(token) {
      try {
        const base64 = token.split(".")[1];
        if (!base64) return null;
        return JSON.parse(atob(base64));
      } catch (error) {
        console.error("No se pudo decodificar el token", error);
        return null;
      }
    }

    function buildJokerBluePlayCode(deckId, userId, nowIso) {
      return [
        deckId,
        userId,
        nowIso,
        "JOKER",
        "BLUE",
        "request_blue_joker",
        `U:${userId}`,
        "manual",
        `U:${ADMIN_USER_ID}`
      ].join("§");
    }

    function updateServerNextLabels() {
      const labels = document.querySelectorAll("#serverNextPanel .server-next__label");
      const planLabel = document.getElementById("serverPlanLabel");

      if (!labels.length) return;

      if (isBlueOnTop) {
        if (planLabel) planLabel.textContent = "Costo mensual 1 dólar";
        labels[0].textContent = "Aprobar J ♥ ♠ ♦ ♣";
        labels[1].textContent = "Enviar A, K, Q ♥ ♠ ♦ ♣";
        labels[2].textContent = "Despedir A, K, Q ♥ ♠ ♦ ♣";
        labels[3].textContent = "Publicar A♥ J♥ ♠ ♣";

      } else {
        if (planLabel) planLabel.textContent = "Gratis";
        labels[0].textContent = "Aprobar J ♥ ♠ ♦ ♣";
        labels[1].textContent = "Enviar Q ♠";
        labels[2].textContent = "Despedir Q ♠";
        labels[3].textContent = "Publicar A♥ J ♥ ♠";

      }
    }

    function renderFinalJokers() {
      const pack = document.getElementById("pack");
      if (!pack) return;

      pack.className = "pack jokers-only";

      pack.innerHTML = `
        <button
          id="jokerToggleBtn"
          type="button"
          class="joker-toggle-btn"
          aria-label="Cambiar orden de jokers"
          title="Cambiar orden de jokers"
        >
          ${isBlueOnTop
          ? `
              <img src="/assets/icons/Joker.png" class="joker-red joker-red--bottom" alt="Joker rojo">
              <img src="/assets/icons/joker_blue.png" class="joker-blue joker-blue--top" alt="Joker azul">
            `
          : `
              <img src="/assets/icons/joker_blue.png" class="joker-blue joker-blue--bottom" alt="Joker azul">
              <img src="/assets/icons/Joker.png" class="joker-red joker-red--top" alt="Joker rojo">
            `
        }
        </button>
      `;

      const btn = document.getElementById("jokerToggleBtn");

      btn?.addEventListener("click", () => {
        isBlueOnTop = !isBlueOnTop;
        renderFinalJokers();
        updateServerNextLabels();
        updateJokerPlanOptions();
        setStatus(
          isBlueOnTop
            ? "Joker azul seleccionado."
            : "Joker rojo seleccionado."
        );
      });

      requestAnimationFrame(() => {
        btn?.classList.add("is-wiggle");
        setTimeout(() => btn?.classList.remove("is-wiggle"), 700);
      });
    }

    function showPlacard() {
      const placardEl = document.getElementById("placard-container");
      if (!placardEl) return;

      placardEl.classList.remove("is-hidden");
      placardEl.classList.add("is-visible");
      placardEl.style.display = "block";
    }

    function getSuitSymbol(suit) {
      const value = String(suit || "").toUpperCase();

      if (value === "HEART" || value === "CORAZON" || value === "♥") return "♥";
      if (value === "DIAMOND" || value === "DIAMANTE" || value === "♦") return "♦";
      if (value === "CLUB" || value === "TREBOL" || value === "♣") return "♣";
      if (value === "SPADE" || value === "PICA" || value === "♠") return "♠";

      return "";
    }

    function renderDeckPlacard() {
      if (typeof renderPlacard !== "function") {
        console.error("renderPlacard no está disponible. Revisar /js/placard.js");
        return;
      }

      renderPlacard("placard-container", {
        deckPhotoUrl,
        rank: "A",
        suit: "HEART",
        title: deckTitle || "Mazo",
        currencyCode: deckCurrencyCode,
        currencyName: deckCurrencyName,
        showCurrency: Boolean(deckCurrencyCode || deckCurrencyName),
        canEditPhoto: false,
        isEditingPhoto: false,
        draftPhotoUrl: deckPhotoUrl
      });

      showPlacard();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function bindPlacardPhotoControls() {
      const photoBtn = document.getElementById("placardPhotoBtn");
      const saveBtn = document.getElementById("placardPhotoSaveBtn");
      const cancelBtn = document.getElementById("placardPhotoCancelBtn");
      const input = document.getElementById("placardPhotoUrlInput");

      photoBtn?.addEventListener("click", () => {
        isEditingPlacardPhoto = true;
        renderDeckPlacard();
      });

      saveBtn?.addEventListener("click", () => {
        deckPhotoUrl = String(input?.value || "").trim();
        isEditingPlacardPhoto = false;
        renderDeckPlacard();
      });

      cancelBtn?.addEventListener("click", () => {
        isEditingPlacardPhoto = false;
        renderDeckPlacard();
      });
    }

    async function loadDeckForPlacard() {
      const deckId = getDeckIdFromUrl();
      const token = getToken();

      if (!deckId || !token) {
        renderDeckPlacard();
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/mazos/${deckId}/state`, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();
        const jokerPlay = Array.isArray(data?.plays)
          ? data.plays.find((play) =>
            String(play.card_rank || "").toUpperCase() === "JOKER" &&
            String(play.card_suit || "").toUpperCase() === "BLUE"
          )
          : null;

        currentJokerPlayId = Number(jokerPlay?.id || 0);

        if (jokerPlay) {
          currentJokerPlayId = Number(jokerPlay.id || 0);

          const jokerStatus = String(jokerPlay.play_status || "").toUpperCase();
          const jokerEndDate = jokerPlay.end_date || null;

          jokerBlueActive =
            jokerStatus === "ACTIVE" &&
            jokerEndDate &&
            new Date(jokerEndDate) > new Date();

          if (jokerBlueActive) {
            isBlueOnTop = true;

            renderFinalJokers();
            updateServerNextLabels();
            updateJokerPlanOptions();
          }

          if (jokerStatus === "ACTIVE" && jokerEndDate) {
            const date = new Date(jokerEndDate);
            const planLabel = document.getElementById("serverPlanLabel");

            if (planLabel && !Number.isNaN(date.getTime())) {
              planLabel.textContent = `Vigente hasta ${date.toLocaleDateString("es-UY")}`;
            }
          }
        }
        console.log("STATE", data);

        const deck = data?.mazo || data?.deck || data?.state?.mazo || data?.state?.deck || null;

        if (deck) {
          deckTitle = deck.name || deck.title || deck.deck_name || deckTitle;
          deckPhotoUrl = deck.deck_image_url || deck.photo_url || deck.image_url || "";
          deckCurrencyCode = deck.currency_symbol || deck.currency_code || "";
          deckCurrencyName = deck.currency_name || "";
        }
      } catch (error) {
        console.error("Error cargando placard del mazo:", error);
      }

      renderDeckPlacard();
    }

    function enableServerNextPanel() {
      const panel = document.getElementById("serverNextPanel");
      if (!panel) return;

      panel.classList.remove("server-next--readonly", "is-hidden");
      panel.classList.add("server-next--editable");
    }

    function addMonthsToDate(date, months) {
      const next = new Date(date);
      next.setMonth(next.getMonth() + Number(months || 1));
      return next;
    }

    async function handleSaveJokerPlan(months) {
      const token = getToken();

      if (!token) {
        setStatus("Falta sesión activa", true);
        return;
      }

      if (!currentJokerPlayId) {
        setStatus("No se encontró la línea Joker del mazo", true);
        return;
      }

      const now = new Date();
      const endDate = addMonthsToDate(now, months);

      try {
        setStatus(`Activando Joker azul por ${months} mes${months > 1 ? "es" : ""}...`);

        const response = await fetch(`${API_BASE_URL}/plays/${currentJokerPlayId}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            play_status: "ACTIVE",
            startDate: now.toISOString(),
            endDate: endDate.toISOString(),
            text: `Joker azul vigente por ${months} mes${months > 1 ? "es" : ""}`
          })
        });

        const data = await response.json();

        if (!response.ok || !data?.ok) {
          setStatus(data?.error || "No se pudo activar el Joker azul", true);
          return;
        }

        setStatus(`Joker azul activo hasta ${endDate.toLocaleDateString("es-UY")}.`);
        setTimeout(() => {
          window.location.href = `/mazoAdministradores.html?deckId=${getDeckIdFromUrl()}`;
        }, 800);
      } catch (error) {
        console.error("Error activando Joker azul:", error);
        setStatus("Error de red al activar Joker azul", true);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      // Primero dejamos la página en estado Joker.
      // Así nunca se ve el paquete viejo de nuevo-mazo mientras carga el mazo.
      renderFinalJokers();
      updateServerNextLabels();
      updateJokerPlanOptions();
      enableServerNextPanel();
      renderDeckPlacard();

      setStatus("Elegí el Joker rojo o azul.");

      document.querySelectorAll(".joker-plan-option").forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedJokerMonths = Number(btn.dataset.months || 1);
          updateJokerPlanOptions();

          if (isBlueOnTop) {
            handleSaveJokerPlan(selectedJokerMonths);
          }
        });
      });

      // Después completamos el placard con los datos reales del mazo.
      await loadDeckForPlacard();
    });
  </script>
</body>

</html>
