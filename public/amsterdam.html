<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tribuna Amsterdam - CoopTrack</title>
    <link rel="icon" type="image/png" href="/assets/icons/bigote.png" />

    <!-- Global styles -->
    <link rel="stylesheet" href="/css/global.css" />

    <!-- Tribuna page specific styles (future) -->
    <link rel="stylesheet" href="/css/tribuna.css" />

    <!-- Card type render -->
    <link rel="stylesheet" href="/css/cartatipo.css" />
    <link rel="stylesheet" href="/css/lienzo.css" />
    <!-- Placard styles -->
    <link rel="stylesheet" href="/css/placard.css" />
    <link rel="stylesheet" href="/css/topbar.css" />
</head>

<body>
    <!-- Topbar container (rendered by topbar.js) -->
    <div id="topbar-container"></div>

    <!-- Main tribuna page content -->
    <main class="tribuna-page tribuna-page--amsterdam">
        <section id="tribuna-root" class="tribuna-page__root">
            <!-- Placard container (optional) -->
            <div id="tribuna-placard" class="tribuna__placard-zone"></div>

            <!-- Tribuna content (rendered by amsterdam.js) -->
            <div id="tribuna-content" class="tribuna__content-zone"></div>

            <!-- Actions container -->
            <div id="tribuna-actions" class="tribuna__actions-zone"></div>

            <!-- Chat/Talud container (future) -->
            <!-- <div id="tribuna-talud" class="tribuna__talud-zone"></div> -->
        </section>
    </main>

    <!-- Scripts -->
    <!-- Topbar (required for all pages) -->
    <script src="/js/topbar.js"></script>

    <!-- Card type helper (used in tribuna render) -->
    <script src="/js/cartatipo.js"></script>

    <!-- Placard helper -->
    <script src="/js/placard.js"></script>

    <!-- Chat helper (future) -->
    <!-- <script src="/js/chat.js"></script> -->

    <!-- Amsterdam tribuna module -->
    <script src="/js/amsterdam.js"></script>

    <!-- Tribuna initialization script (future: move to tribuna-core.js) -->
    <!-- Tribuna initialization script -->
    <script>
        (async function () {
            const API_BASE_URL = "https://cooptrack-backend.onrender.com";

            const urlParams = new URLSearchParams(window.location.search);
            const playId = urlParams.get("playId");
            const token = localStorage.getItem("cooptrackToken");

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function resolveTargetUser(play) {
                return {
                    nickname: play?.target_user_nickname || "Invitado",
                    profile_photo_url:
                        play?.target_user_profile_photo_url ||
                        play?.target_profile_photo_url ||
                        "/assets/icons/singeta120.gif"
                };
            }

            function renderSenderCard(play) {
                const parent = play?.parent_play;

                if (!parent) return "";

                return window.CartaTipo.renderPlayCardBox({
                    rank: parent.card_rank,
                    suit: parent.card_suit,

                    title: parent.play_text || "",

                    metas: [],

                    ownerUser: null,
                    ownerCards: [],

                    actionsHtml: ""
                });
            }



            function renderEconomicCard(play) {
                const rank = normalizeText(play?.card_rank || play?.rank);
                const suit = normalizeText(play?.card_suit || play?.suit);

                if (!(rank === "Q" && suit === "SPADE")) return "";

                const targetUser = resolveTargetUser(play);
                console.log("QQPICA PLAY", play);
                return window.CartaTipo.renderPlayCardBox({
                    rank: "Q",
                    suit: "HEART",

                    title: "",

                    metas: [
                        { text: play?.payment_concept || play?.concept || "Ticket" },
                        { text: play?.amount ? `UYU ${play.amount}` : "" },
                        { text: play?.pay_date || play?.payment_date || "" }
                    ].filter((m) => m.text),

                    ownerUser: targetUser,
                    ownerLabel: `Paga ${targetUser.nickname}`,

                    ownerCards: [],
                    actionsHtml: renderTargetActions(play),

                    showOwner: true,
                    showActions: true
                });
            }

            function normalizeText(value) {
                return String(value || "").trim().toUpperCase();
            }

            function formatTimeLabel(value) {
                if (!value) return "";
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return "";
                return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
            }

            function renderTargetActions(play) {
                const status = normalizeText(play?.play_status || play?.status);

                if (status !== "SENT" && status !== "PENDING") return "";

                return `
    <button id="lienzo-accept-btn" class="icon-btn" title="Aceptar">
      <img src="/assets/icons/Sello40.gif" alt="Aceptar" />
    </button>

    <button id="lienzo-reject-btn" class="icon-btn" title="Rechazar">
      <img src="/assets/icons/stepback40.gif" alt="Rechazar" />
    </button>
  `;
            }

            function renderPlayCardBox(play) {
                const parent = play?.parent_play || play?.parent || null;

                const title =
                    parent?.play_text ||
                    play?.parent_play_text ||
                    play?.play_text ||
                    "";

                const spadeMode = normalizeText(parent?.spade_mode || play?.spade_mode);
                const isDeadline = spadeMode === "DEADLINE";

                const timeValue = isDeadline
                    ? (parent?.end_date || play?.end_date)
                    : (parent?.start_date || play?.start_date);

                const location = isDeadline
                    ? ""
                    : String(parent?.location || play?.location || "").trim();

                const metas = [
                    timeValue
                        ? {
                            icon: `/assets/icons/${isDeadline ? "bombaRedonda60.gif" : "reloj60.gif"}`,
                            text: formatTimeLabel(timeValue)
                        }
                        : null,

                    location
                        ? {
                            icon: "/assets/icons/LocGlobito80.gif",
                            text: location
                        }
                        : null
                ].filter(Boolean);

                return window.CartaTipo.renderPlayCardBox({
                    rank: play?.card_rank,
                    suit: play?.card_suit,
                    title,
                    status: play?.play_status || "",
                    metas,
                    ownerUser: null,
                    ownerCards: [],
                    actionsHtml: "",
                    showOwner: false,
                    showActions: false
                });

                return `
    <div class="tribuna-card-fallback">
      ${escapeHtml(play?.card_rank || "")}${escapeHtml(play?.card_suit || "")}
    </div>
  `;
            }

            function bindTargetActions(play) {
                const acceptBtn = document.getElementById("lienzo-accept-btn");
                const rejectBtn = document.getElementById("lienzo-reject-btn");

                if (acceptBtn) {
                    acceptBtn.addEventListener("click", async () => {
                        await updatePlayStatus(play, "APPROVED");
                    });
                }

                if (rejectBtn) {
                    rejectBtn.addEventListener("click", async () => {
                        await updatePlayStatus(play, "REJECTED");
                    });
                }
            }

            function isMobileViewport() {
                return window.matchMedia("(max-width: 900px)").matches;
            }

            function resolveAfterAmsterdamActionUrl(play, status) {
                const deckId = Number(play?.deck_id || 0);
                const rank = normalizeText(play?.card_rank || play?.rank);
                const suit = normalizeText(play?.card_suit || play?.suit);
                const normalizedStatus = normalizeText(status);

                const deckQuery = deckId ? `?id=${deckId}` : "";

                if (!isMobileViewport()) {
                    return `/mazo.html${deckQuery}`;
                }

                // Todo rechazo va al archivo
                if (
                    ["REJECTED", "CANCELLED", "QUIT", "FIRED"].includes(normalizedStatus)
                ) {
                    return deckId
                        ? `/mazoArchivo.html?id=${deckId}`
                        : "/archivo.html";
                }

                if (rank === "Q" && suit === "SPADE") {
                    return "/almanaque.html";
                }

                if (rank === "K") {
                    return `/mazo.html${deckQuery}`;
                }

                if (rank === "A") {
                    return `/mazoAdministradores.html${deckQuery}`;
                }

                return `/mazo.html${deckQuery}`;
            }

            async function updatePlayStatus(play, status) {
                const response = await fetch(`${API_BASE_URL}/plays/${play.id}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        play_status: status
                    })
                });

                const data = await response.json().catch(() => null);

                if (!response.ok || !data?.ok) {
                    alert("No se pudo actualizar la jugada.");
                    return;
                }

                window.location.href = `/mazo.html?id=${play.deck_id}`;
            }



            function renderTribunaPlacard(play, deckState) {
                const host = document.getElementById("tribuna-placard");
                if (!host || typeof window.renderPlacard !== "function") return;

                const parent = play?.parent_play || null;
                const deck = deckState?.mazo || deckState?.deck || {};

                window.renderPlacard(host, {
                    page: "tribuna-amsterdam",
                    mode: "AMSTERDAM",
                    play,
                    currentUserId: Number(play?.target_user_id || 0),

                    deckId: play?.deck_id,
                    deck,
                    mazo: deck,

                    photoUrl: deck?.deck_image_url || play?.deck_image_url || "",
                    rank: "A",
                    suit: "HEART",
                    title: deck?.name || play?.deck_name || "Mazo",

                    showCurrency: false,
                    leftCards: [],
                    plays: Array.isArray(deckState?.plays)
                        ? deckState.plays
                        : [parent, play].filter(Boolean)
                });
            }

            async function loadPlay() {
                if (!playId) {
                    document.getElementById("tribuna-content").innerHTML =
                        `<div class="tribuna-error">Falta playId.</div>`;
                    return;
                }

                if (!token) {
                    document.getElementById("tribuna-content").innerHTML =
                        `<div class="tribuna-error">Falta sesión activa.</div>`;
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/plays/${playId}`, {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!response.ok || !data.ok || !data.play) {
                    document.getElementById("tribuna-content").innerHTML =
                        `<div class="tribuna-error">No se pudo cargar la jugada.</div>`;
                    return;
                }
                let play = data.play;
                let deckState = null;

                const stateResponse = await fetch(`${API_BASE_URL}/mazos/${play.deck_id}/state`, {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });


                const stateData = await stateResponse.json().catch(() => null);

                if (stateResponse.ok && stateData?.ok) {
                    deckState = stateData;
                }

                if (play.parent_play_id) {
                    const parentResponse = await fetch(`${API_BASE_URL}/plays/${play.parent_play_id}`, {
                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    });

                    const parentData = await parentResponse.json();

                    if (parentResponse.ok && parentData.ok && parentData.play) {
                        play = {
                            ...play,
                            parent_play: parentData.play
                        };
                    }
                }
                const html = window.renderAmsterdamMobile(play, {
                    resolveTargetUser,
                    renderPlayCardBox,
                    renderEconomicCard,
                    renderSenderCard,
                    escapeHtml
                });

                document.getElementById("tribuna-content").innerHTML = html;
                if (typeof window.enableAmsterdamPeek === "function") {
                    window.enableAmsterdamPeek();
                }
                renderTribunaPlacard(play, deckState);
                bindTargetActions(play);
            }

            await loadPlay();
        })();
    </script>
</body>

</html>
